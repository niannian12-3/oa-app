name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java and Android SDK
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        
        # 设置Android SDK
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        
        # 接受所有许可证
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # 安装必要的Android组件
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
    
    - name: Fix Android project issues
      run: |
        if [ -d "android" ]; then
          cd android
          
          echo "=== 修复Kotlin编译问题 ==="
          
          # 修复AuthManager.kt中的firstOrNull问题
          if [ -f "app/src/main/java/com/oa/app/util/AuthManager.kt" ]; then
            echo "修复AuthManager.kt..."
            sed -i 's/\.firstOrNull()/.first()/g' app/src/main/java/com/oa/app/util/AuthManager.kt
          fi
          
          # 修复LocationHelper.kt中的问题
          if [ -f "app/src/main/java/com/oa/app/util/LocationHelper.kt" ]; then
            echo "修复LocationHelper.kt..."
            # 确保有正确的导入
            if ! grep -q "import kotlinx.coroutines.tasks.await" app/src/main/java/com/oa/app/util/LocationHelper.kt; then
              sed -i '/import kotlinx.coroutines/a import kotlinx.coroutines.tasks.await' app/src/main/java/com/oa/app/util/LocationHelper.kt
            fi
          fi
          
          echo "=== 修复主题问题 ==="
          
          # 确保使用AppCompat主题而不是Material3
          if [ -f "app/src/main/res/values/themes.xml" ]; then
            echo "更新themes.xml使用AppCompat..."
            sed -i 's/Theme\.Material3\.DayNight\.DarkActionBar/Theme.AppCompat.Light.DarkActionBar/g' app/src/main/res/values/themes.xml
          fi
          
          # 确保AndroidManifest.xml使用正确的主题
          if [ -f "app/src/main/AndroidManifest.xml" ]; then
            echo "确保AndroidManifest使用正确主题..."
            sed -i 's/android:theme="@style\/[^"]*"/android:theme="@style\/Theme.OAApp"/g' app/src/main/AndroidManifest.xml
          fi
          
          # 检查并修复build.gradle依赖
          if [ -f "app/build.gradle" ]; then
            echo "检查build.gradle依赖..."
            
            # 确保有AppCompat依赖
            if ! grep -q "androidx.appcompat:appcompat" app/build.gradle; then
              echo "添加AppCompat依赖..."
              sed -i '/dependencies {/a\    implementation "androidx.appcompat:appcompat:1.6.1"' app/build.gradle
            fi
            
            # 确保有协程依赖
            if ! grep -q "kotlinx-coroutines-android" app/build.gradle; then
              echo "添加协程依赖..."
              sed -i '/dependencies {/a\    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"' app/build.gradle
            fi
          fi
          
          echo "=== 项目修复完成 ==="
        else
          echo "错误：android目录不存在"
          exit 1
        fi
    
    - name: Setup Gradle
      run: |
        if [ -d "android" ]; then
          cd android
          
          # 如果gradlew不存在，创建它
          if [ ! -f "gradlew" ]; then
            echo "创建gradle wrapper..."
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          fi
          
          chmod +x gradlew
          echo "Gradle版本:"
          ./gradlew --version
        fi
    
    - name: Build APK
      run: |
        if [ -d "android" ]; then
          cd android
          echo "开始构建APK..."
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --info
          
          # 检查APK是否生成
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK生成成功！"
            ls -la app/build/outputs/apk/debug/
          else
            echo "错误：APK未生成"
            exit 1
          fi
        else
          echo "错误：android目录不存在"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: oa-app-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 7