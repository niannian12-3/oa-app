name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk wget unzip
          mkdir -p ~/android-sdk
          cd ~/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools cmdline-tools-temp
          mkdir -p cmdline-tools
          mv cmdline-tools-temp cmdline-tools/latest
          export ANDROID_HOME=~/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          cd $GITHUB_WORKSPACE
      - name: Fix Android project - SIMPLE SOLUTION
        run: |
          if [ -d "android" ]; then
            cd android
            
            # 1. 检查并修复build.gradle
            if [ -f "app/build.gradle" ]; then
              # 确保有AppCompat依赖
              if ! grep -q "androidx.appcompat:appcompat" app/build.gradle; then
                sed -i '/dependencies {/a\    implementation "androidx.appcompat:appcompat:1.6.1"' app/build.gradle
              fi
            fi
            
            # 2. 创建简单的主题文件 - 使用AppCompat
            mkdir -p app/src/main/res/values
            echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/themes.xml
            echo '<resources>' >> app/src/main/res/values/themes.xml
            echo '    <style name="Theme.OAApp" parent="Theme.AppCompat.Light.DarkActionBar">' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorPrimary">#3F51B5</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorPrimaryDark">#303F9F</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorAccent">#FF4081</item>' >> app/src/main/res/values/themes.xml
            echo '    </style>' >> app/src/main/res/values/themes.xml
            echo '</resources>' >> app/src/main/res/values/themes.xml
            
            # 3. 创建strings.xml
            echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/strings.xml
            echo '<resources>' >> app/src/main/res/values/strings.xml
            echo '    <string name="app_name">OA App</string>' >> app/src/main/res/values/strings.xml
            echo '</resources>' >> app/src/main/res/values/strings.xml
            
            # 4. 修复AndroidManifest.xml
            if [ -f "app/src/main/AndroidManifest.xml" ]; then
              # 创建备份
              cp app/src/main/AndroidManifest.xml app/src/main/AndroidManifest.xml.backup
              
              # 读取并修复文件
              content=$(cat app/src/main/AndroidManifest.xml)
              
              # 移除图标引用
              content=${content//android:icon=\"@mipmap\/ic_launcher\"/}
              content=${content//android:roundIcon=\"@mipmap\/ic_launcher_round\"/}
              
              # 修复主题引用
              content=${content//android:theme=\"@style\/Theme.Material3.DayNight.DarkActionBar\"/android:theme=\"@style\/Theme.OAApp\"}
              content=${content//android:theme=\"@style\/Theme.Material3\"/android:theme=\"@style\/Theme.OAApp\"}
              content=${content//android:theme=\"@style\/Theme\"/android:theme=\"@style\/Theme.OAApp\"}
              
              # 写回文件
              echo "$content" > app/src/main/AndroidManifest.xml
            fi
          fi
      - run: |
          if [ -d "android" ]; then
            cd android
            if [ -f "gradlew" ]; then
              chmod +x gradlew
              ./gradlew clean
              ./gradlew assembleDebug --stacktrace
            else
              wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
              unzip -q gradle-8.2-bin.zip
              ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
              chmod +x gradlew
              ./gradlew clean
              ./gradlew assembleDebug --stacktrace
            fi
          else
            echo "android directory not found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/*.apk
