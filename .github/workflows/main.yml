name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      # 仅保留这个，解决 Node 20 弃用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # 开启 Gradle 缓存加速
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: Fix Gradle & Dependencies (Safe Approach)
      run: |
        cd android
        
        # 1. 确保 gradlew 可执行
        chmod +x gradlew
        
        # 2. 智能添加 Material 依赖 (使用更安全的追加方式)
        # 检查 app/build.gradle 是否存在
        if [ ! -f "app/build.gradle" ]; then
          echo "Error: app/build.gradle not found!"
          exit 1
        fi

        # 辅助函数：如果不存在则添加依赖
        add_dep() {
          local dep="$1"
          if ! grep -q "$dep" app/build.gradle; then
            # 找到 dependencies { 块，在最后一行之前插入（避免破坏结构）
            # 这里使用一种更稳妥的方法：在 dependencies { 后直接换行添加
            sed -i "/^dependencies {/a\\    implementation '$dep'" app/build.gradle
            echo "Added dependency: $dep"
          else
            echo "Dependency already exists: $dep"
          fi
        }

        add_dep "com.google.android.material:material:1.11.0"
        # 只有当项目确实使用 Compose 时才需要下面这个，普通 View 项目不需要，避免冲突
        # add_dep "androidx.compose.material3:material3:1.1.2" 

    - name: Verify Resources (Critical Step)
      run: |
        cd android
        echo "Checking for XML syntax errors in res/values..."
        # 简单的检查：看是否有未闭合的标签或明显的非法字符
        # 如果这里有错，构建一定会挂，提前暴露
        find app/src/main/res/values -name "*.xml" -exec grep -L "</resources>" {} \; | while read file; do
          echo "ERROR: $file might have unclosed tags or missing </resources>"
          exit 1
        done
        echo "Resource XML structure looks okay."

    - name: Build APK (Clean Build)
      run: |
        cd android
        # 关键：彻底清理，防止之前的缓存导致 sourceSetPathMap 错误
        ./gradlew clean --no-daemon
        ./gradlew assembleDebug --stacktrace --no-daemon --warning-mode all
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always() # 即使构建失败也尝试上传（如果有部分产物），方便调试
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 5
