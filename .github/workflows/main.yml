name: 构建安卓APK

on:
  push:
    branches: [主分支]

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 安装 Android SDK 组件
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: 修复Android项目
      run: |
        echo "修复Android项目..."
        cd android
        
        # 方法1：直接修改build.gradle - 最简单可靠
        if ! grep -q "com.google.android.material:material" app/build.gradle; then
          echo "正在添加Material 3依赖..."
          # 创建临时文件
          cat > /tmp/fix_deps.py << 'EOF'
import re
with open('app/build.gradle', 'r') as f:
    content = f.read()
    
# 在dependencies块中添加Material依赖
pattern = r'(dependencies\s*\{)'
replacement = r'\1\n    implementation "com.google.android.material:material:1.11.0"'
new_content = re.sub(pattern, replacement, content, count=1)

with open('app/build.gradle', 'w') as f:
    f.write(new_content)
EOF
          python3 /tmp/fix_deps.py
        fi
        
        # 确保主题文件存在
        mkdir -p app/src/main/res/values
        if [ ! -f "app/src/main/res/values/themes.xml" ]; then
          cat > app/src/main/res/values/themes.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources xmlns:tools="http://schemas.android.com/tools">
    <style name="Theme.Material3.DayNight.DarkActionBar" parent="Theme.Material3.DayNight">
        <item name="colorPrimary">@color/purple_500</item>
        <item name="colorPrimaryVariant">@color/purple_700</item>
        <item name="colorOnPrimary">@color/white</item>
        <item name="colorSecondary">@color/teal_200</item>
        <item name="colorSecondaryVariant">@color/teal_700</item>
        <item name="colorOnSecondary">@color/black</item>
        <item name="android:statusBarColor" tools:targetApi="l">?attr/colorPrimaryVariant</item>
    </style>
</resources>
EOF
        fi
        
        echo "项目修复完成"
    
    - name: 构建APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: oa-app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
