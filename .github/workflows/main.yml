name: Build Android APK

名称：构建安卓 APK
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Detect Project and Fix Gradle
      run: |
        echo "🔍 检测项目结构..."
        
        PROJECT_DIR=""
        
        # 检查根目录
        if [ -f "build.gradle" ] || [ -f "settings.gradle" ]; then
          echo "✅ 发现根目录是 Android 项目"
          PROJECT_DIR="."
        # 检查 android 子目录
        elif [ -d "android" ] && [ -f "android/build.gradle" ]; then
          echo "✅ 发现 android 子目录"
          PROJECT_DIR="android"
        else
          echo "❌ 错误：找不到 Android 项目结构"
          ls -R
          exit 1
        fi
        
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
        
        cd $PROJECT_DIR
        
        # 如果 gradlew 不存在，尝试生成
        if [ ! -f "gradlew" ]; then
          echo "⚠️ gradlew 不存在，正在生成..."
          if command -v gradle &> /dev/null; then
            gradle wrapper --gradle-version 8.2
          else
            echo "❌ 未找到 gradle 命令且无 gradlew，尝试使用默认 wrapper"
            # 创建基本的 wrapper 属性文件
            mkdir -p gradle/wrapper
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
            # 下载 wrapper jar (使用 curl)
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            # 创建简单的 gradlew 脚本
            echo '#!/bin/sh' > gradlew
            echo 'exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"' >> gradlew
            chmod +x gradlew
          fi
        else
          chmod +x gradlew
          echo "✅ gradlew 已存在"
        fi

        # 检查并添加 Material 依赖 (仅当 app/build.gradle 存在时)
        if [ -f "app/build.gradle" ]; then
          if ! grep -q "com.google.android.material:material" app/build.gradle; then
            echo "⚠️ 添加 Material 依赖..."
            # 使用更安全的 sed 写法，避免 YAML 转义问题
            sed -i "/dependencies {/a\\    implementation 'com.google.android.material:material:1.11.0'" app/build.gradle
          fi
        fi

    - name: Build APK
      run: |
        echo "🚀 开始在 $PROJECT_DIR 构建..."
        cd $PROJECT_DIR
        ./gradlew clean assembleDebug --stacktrace --no-daemon --warning-mode all

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug-apk
        path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
        retention-days: 5
        if-no-files-found: warn
