name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk wget unzip
          mkdir -p ~/android-sdk
          cd ~/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools cmdline-tools-temp
          mkdir -p cmdline-tools
          mv cmdline-tools-temp cmdline-tools/latest
          export ANDROID_HOME=~/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          cd $GITHUB_WORKSPACE
      - name: Fix all missing resources
        run: |
          if [ -d "android" ]; then
            cd android
            
            # 1. 添加Material依赖
            if grep -q "dependencies {" app/build.gradle; then
              if ! grep -q "com.google.android.material:material" app/build.gradle; then
                sed -i '/dependencies {/a\    implementation "com.google.android.material:material:1.11.0"' app/build.gradle
              fi
            fi
            
            # 2. 创建主题文件
            mkdir -p app/src/main/res/values
            echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/themes.xml
            echo '<resources xmlns:tools="http://schemas.android.com/tools">' >> app/src/main/res/values/themes.xml
            echo '    <style name="Theme.OAApp" parent="Theme.Material3.DayNight.DarkActionBar">' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorPrimary">#6200EE</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorPrimaryVariant">#3700B3</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorOnPrimary">#FFFFFF</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorSecondary">#03DAC6</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorSecondaryVariant">#018786</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorOnSecondary">#000000</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="android:statusBarColor" tools:targetApi="l">?attr/colorPrimaryVariant</item>' >> app/src/main/res/values/themes.xml
            echo '    </style>' >> app/src/main/res/values/themes.xml
            echo '</resources>' >> app/src/main/res/values/themes.xml
            
            # 3. 创建完整的strings.xml - 添加所有缺失的字符串
            echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/strings.xml
            echo '<resources>' >> app/src/main/res/values/strings.xml
            echo '    <string name="app_name">OA App</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="clock_in">Clock In</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="clock_out">Clock Out</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="login_title">Login</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="employee_id">Employee ID</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="password">Password</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="login">Login</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="nav_attendance">Attendance</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="nav_leave">Leave</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="nav_expense">Expense</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="nav_employees">Employees</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="nav_mine">Mine</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="attendance">Attendance</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="leave">Leave</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="expense">Expense</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="employees">Employees</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="home">Home</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="dashboard">Dashboard</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="notifications">Notifications</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="submit">Submit</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="cancel">Cancel</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="save">Save</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="delete">Delete</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="edit">Edit</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="add">Add</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="search">Search</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="settings">Settings</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="profile">Profile</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="logout">Logout</string>' >> app/src/main/res/values/strings.xml
            echo '    <string name="welcome">Welcome</string>' >> app/src/main/res/values/strings.xml
            echo '</resources>' >> app/src/main/res/values/strings.xml
            
            # 4. 创建图标目录（避免图标错误）
            mkdir -p app/src/main/res/mipmap-hdpi
            mkdir -p app/src/main/res/mipmap-mdpi
            mkdir -p app/src/main/res/mipmap-xhdpi
            mkdir -p app/src/main/res/mipmap-xxhdpi
            mkdir -p app/src/main/res/mipmap-xxxhdpi
            
            # 5. 修复AndroidManifest
            if [ -f "app/src/main/AndroidManifest.xml" ]; then
              # 移除图标引用
              sed -i 's/android:icon="@mipmap\/ic_launcher"//g' app/src/main/AndroidManifest.xml
              sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' app/src/main/AndroidManifest.xml
              # 确保使用正确的主题
              sed -i 's/android:theme="@style\/Theme\..*"/android:theme="@style\/Theme.OAApp"/g' app/src/main/AndroidManifest.xml
            fi
            
            echo "所有资源已修复完成"
          fi
      - run: |
          if [ -d "android" ]; then
            cd android
            if [ -f "gradlew" ]; then
              chmod +x gradlew
              ./gradlew clean
              ./gradlew assembleDebug --stacktrace
            else
              wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
              unzip -q gradle-8.2-bin.zip
              ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
              chmod +x gradlew
              ./gradlew clean
              ./gradlew assembleDebug --stacktrace
            fi
          else
            echo "android directory not found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/*.apk
