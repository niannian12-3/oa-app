name: 构建安卓APK

on:
  push:
    branches: [主分支]

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 安装 Android SDK 组件
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: 修复Android项目
      run: |
        echo "修复Android项目..."
        cd android
        
        # 创建修复脚本
        cat > fix_project.sh << 'EOF'
#!/bin/bash
# 添加Material依赖
if ! grep -q "com.google.android.material:material" app/build.gradle; then
  echo "    implementation \"com.google.android.material:material:1.11.0\"" >> app/build.gradle
fi

# 创建主题文件
mkdir -p app/src/main/res/values
cat > app/src/main/res/values/themes.xml << 'THEMEEOF'
<?xml version="1.0" encoding="utf-8"?>
<resources xmlns:tools="http://schemas.android.com/tools">
    <style name="Theme.Material3.DayNight.DarkActionBar" parent="Theme.Material3.DayNight">
        <item name="colorPrimary">@color/purple_500</item>
        <item name="colorPrimaryVariant">@color/purple_700</item>
        <item name="colorOnPrimary">@color/white</item>
        <item name="colorSecondary">@color/teal_200</item>
        <item name="colorSecondaryVariant">@color/teal_700</item>
        <item name="colorOnSecondary">@color/black</item>
        <item name="android:statusBarColor" tools:targetApi="l">?attr/colorPrimaryVariant</item>
    </style>
</resources>
THEMEEOF
EOF
        
        chmod +x fix_project.sh
        ./fix_project.sh
        echo "项目修复完成"
    
    - name: 构建APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: oa-app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
