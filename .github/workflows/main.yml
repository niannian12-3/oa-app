name: Build OA App (Final Fixed)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ✅ 关键修复：手动下载并指定 Gradle 8.7，避开系统默认版本
    - name: Setup Specific Gradle 8.7
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        rm gradle-8.7-bin.zip
        echo "$GITHUB_WORKSPACE/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/oa/app
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-anydpi-v26

    # 1. MainActivity.kt
    - name: Generate MainActivity.kt
      run: |
        cat > app/src/main/java/com/oa/app/MainActivity.kt << 'KOTLIN_EOF'
        package com.oa.app
        import android.os.Bundle
        import android.widget.*
        import androidx.appcompat.app.AppCompatActivity
        import kotlinx.coroutines.*
        import java.io.*
        import java.net.*

        class MainActivity : AppCompatActivity() {
            private val SERVER_URL = "http://192.168.11.43:3000/login"

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
                val etId = findViewById<EditText>(R.id.employeeIdEditText)
                val etPwd = findViewById<EditText>(R.id.passwordEditText)
                val btnLogin = findViewById<Button>(R.id.loginButton)
                val tvStatus = findViewById<TextView>(R.id.statusTextView)
                tvStatus.text = "就绪 (IP: 192.168.11.43)"

                btnLogin.setOnClickListener {
                    val id = etId.text.toString().trim()
                    val pwd = etPwd.text.toString().trim()
                    if (id.isEmpty() || pwd.isEmpty()) {
                        Toast.makeText(this, "请输入账号密码", Toast.LENGTH_SHORT).show()
                        return@setOnClickListener
                    }
                    tvStatus.text = "连接中..."
                    btnLogin.isEnabled = false
                    CoroutineScope(Dispatchers.IO).launch {
                        var msg = ""
                        try { msg = login(id, pwd) } 
                        catch (e: Exception) { msg = "❌ ${e.javaClass.simpleName}: ${e.message}" }
                        withContext(Dispatchers.Main) {
                            tvStatus.text = msg
                            btnLogin.isEnabled = true
                            Toast.makeText(this@MainActivity, msg, Toast.LENGTH_LONG).show()
                        }
                    }
                }
            }

            private fun login(id: String, pwd: String): String {
                val conn = URL(SERVER_URL).openConnection() as HttpURLConnection
                try {
                    conn.requestMethod = "POST"
                    conn.doOutput = true
                    conn.connectTimeout = 10000
                    conn.readTimeout = 10000
                    conn.setRequestProperty("Content-Type", "application/json")
                    OutputStreamWriter(conn.outputStream).use { it.write("""{"employeeId":"$id","password":"$pwd"}""") }
                    val code = conn.responseCode
                    return if (code == 200) "✅ 成功: ${BufferedReader(InputStreamReader(conn.inputStream)).readText()}" else "⚠️ 错误码: $code"
                } catch (e: UnknownHostException) { return "❌ 找不到服务器\n检查WiFi和IP" }
                catch (e: ConnectException) { return "❌ 连接被拒绝\n检查防火墙/后端" }
                catch (e: SocketTimeoutException) { return "❌ 连接超时" }
                catch (e: Exception) { return "❌ 错误: ${e.message}" }
                finally { conn.disconnect() }
            }
        }
        KOTLIN_EOF

    # 2. Layout
    - name: Generate Layout
      run: |
        cat > app/src/main/res/layout/activity_main.xml << 'XML_EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:padding="24dp" android:gravity="center">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="OA 办公系统" android:textSize="24sp" android:textStyle="bold" android:layout_marginBottom="32dp"/>
            <EditText android:id="@+id/employeeIdEditText" android:layout_width="match_parent" android:layout_height="wrap_content"
                android:hint="员工 ID" android:inputType="text" android:layout_marginBottom="16dp"/>
            <EditText android:id="@+id/passwordEditText" android:layout_width="match_parent" android:layout_height="wrap_content"
                android:hint="密码" android:inputType="textPassword" android:layout_marginBottom="24dp"/>
            <Button android:id="@+id/loginButton" android:layout_width="match_parent" android:layout_height="wrap_content"
                android:text="登 录" android:textSize="18sp"/>
            <TextView android:id="@+id/statusTextView" android:layout_width="match_parent" android:layout_height="wrap_content"
                android:layout_marginTop="32dp" android:text="状态" android:textColor="#555"/>
        </LinearLayout>
        XML_EOF

    # 3. Manifest
    - name: Generate Manifest
      run: |
        cat > app/src/main/AndroidManifest.xml << 'XML_EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
                android:label="OA办公" android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true" android:theme="@style/Theme.AppCompat.Light.DarkActionBar"
                android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        XML_EOF

    # 4. app/build.gradle
    - name: Generate app/build.gradle
      run: |
        cat > app/build.gradle << 'GRADLE_EOF'
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.oa.app'
            compileSdk 34
            defaultConfig {
                applicationId "com.oa.app"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
            kotlinOptions { jvmTarget = '17' }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
        }
        GRADLE_EOF

    # 5. Root build.gradle
    - name: Generate Root build.gradle
      run: |
        cat > build.gradle << 'GRADLE_EOF'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
                classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'
            }
        }
        task clean(type: Delete) { delete rootProject.buildDir }
        GRADLE_EOF

    # 6. settings.gradle
    - name: Generate settings.gradle
      run: |
        cat > settings.gradle << 'GRADLE_EOF'
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "OAApp"
        include ':app'
        GRADLE_EOF

    # ✅ 关键修复：生成 gradle.properties 开启 AndroidX
    - name: Generate gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

    # 7. Resources
    - name: Generate Resources
      run: |
        echo '<resources><string name="app_name">OA办公</string><color name="ic_launcher_background">#FFFFFF</color></resources>' > app/src/main/res/values/strings.xml
        echo '<resources><color name="ic_launcher_background">#FFFFFF</color></resources>' > app/src/main/res/values/colors.xml
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/ic_launcher_background"/><foreground android:drawable="@drawable/ic_foreground"/></adaptive-icon>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/ic_launcher_background"/><foreground android:drawable="@drawable/ic_foreground"/></adaptive-icon>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
        mkdir -p app/src/main/res/drawable
        echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#3DDC84" android:pathData="M0,0h108v108H0z"/><path android:fillColor="#FFFFFF" android:pathData="M54,54m-20,0a20,20 0,1 1,40 0a20,20 0,1 1,-40 0"/></vector>' > app/src/main/res/drawable/ic_foreground.xml
        touch app/proguard-rules.pro

    # 8. Build
    - name: Build APK
      run: |
        gradle --version
        gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OA-App-Final
        path: app/build/outputs/apk/debug/app-debug.apk
