name: 构建安卓APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 安装 Android SDK 组件
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: 使用项目自带的gradlew构建
      run: |
        echo "进入android目录..."
        cd android
        
        echo "检查gradlew文件..."
        if [ -f "gradlew" ]; then
          echo "使用项目自带的gradlew..."
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        else
          echo "项目没有gradlew，生成gradlew 8.2..."
          # 下载Gradle 8.2
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        fi
    
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: oa-app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
