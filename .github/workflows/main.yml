name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: Check project structure
      run: |
        echo "Current directory:"
        ls -la
        echo "android directory:"
        ls -la android/
    
    - name: Fix Android project
      run: |
        cd android
        
        # Check gradlew
        if [ ! -f "gradlew" ]; then
          echo "Creating gradle wrapper..."
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
        fi
        
        # Add Material dependency
        if ! grep -q "com.google.android.material:material" app/build.gradle; then
          echo '    implementation "com.google.android.material:material:1.11.0"' >> app/build.gradle
        fi
        
        # Create theme file using echo (no heredoc)
        mkdir -p app/src/main/res/values
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/themes.xml
        echo '<resources xmlns:tools="http://schemas.android.com/tools">' >> app/src/main/res/values/themes.xml
        echo '    <style name="Theme.Material3.DayNight.DarkActionBar" parent="Theme.Material3.DayNight">' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorPrimary">@color/purple_500</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorPrimaryVariant">@color/purple_700</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorOnPrimary">@color/white</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorSecondary">@color/teal_200</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorSecondaryVariant">@color/teal_700</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorOnSecondary">@color/black</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="android:statusBarColor" tools:targetApi="l">?attr/colorPrimaryVariant</item>' >> app/src/main/res/values/themes.xml
        echo '    </style>' >> app/src/main/res/values/themes.xml
        echo '</resources>' >> app/src/main/res/values/themes.xml
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
