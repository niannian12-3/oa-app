name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        cd $GITHUB_WORKSPACE
    - name: Fix compilation issues
      run: |
        if [ -d "android" ]; then
          cd android
          
          # 修复AuthManager.kt - 将firstOrNull()改为first()
          if [ -f "app/src/main/java/com/oa/app/util/AuthManager.kt" ]; then
            echo "修复AuthManager.kt..."
            sed -i 's/\.firstOrNull()/.first()/g' app/src/main/java/com/oa/app/util/AuthManager.kt
          fi
          
          # 修复LocationHelper.kt - 重写整个文件
          if [ -f "app/src/main/java/com/oa/app/util/LocationHelper.kt" ]; then
            echo "修复LocationHelper.kt..."
            cat > app/src/main/java/com/oa/app/util/LocationHelper.kt << 'EOF'
package com.oa.app.util

import android.Manifest
import android.content.Context
import android.content.pm.PackageManager
import android.location.Address
import android.location.Geocoder
import android.location.Location
import androidx.core.content.ContextCompat
import com.google.android.gms.location.FusedLocationProviderClient
import com.google.android.gms.location.LocationServices
import kotlinx.coroutines.suspendCancellableCoroutine
import java.util.Locale
import kotlin.coroutines.resume
import kotlin.coroutines.resumeWithException

class LocationHelper(private val context: Context) {
    
    private val fusedLocationClient: FusedLocationProviderClient = 
        LocationServices.getFusedLocationProviderClient(context)
    
    suspend fun getCurrentLocation(): LocationData? {
        if (ContextCompat.checkSelfPermission(
                context,
                Manifest.permission.ACCESS_FINE_LOCATION
            ) != PackageManager.PERMISSION_GRANTED
        ) {
            return null
        }
        
        return try {
            val location = getLastLocation()
            
            location?.let { loc ->
                val address = getAddressFromLocation(loc.latitude, loc.longitude)
                LocationData(
                    latitude = loc.latitude,
                    longitude = loc.longitude,
                    address = address,
                    accuracy = loc.accuracy
                )
            }
        } catch (e: Exception) {
            e.printStackTrace()
            null
        }
    }
    
    private suspend fun getLastLocation(): Location? = suspendCancellableCoroutine { continuation ->
        fusedLocationClient.lastLocation
            .addOnSuccessListener { location ->
                continuation.resume(location)
            }
            .addOnFailureListener { exception ->
                continuation.resumeWithException(exception)
            }
    }
    
    private fun getAddressFromLocation(latitude: Double, longitude: Double): String? {
        return try {
            val geocoder = Geocoder(context, Locale.getDefault())
            val addresses: List<Address>? = geocoder.getFromLocation(latitude, longitude, 1)
            addresses?.firstOrNull()?.let { address ->
                val addressParts = mutableListOf<String>()
                val maxLines = address.maxAddressLineIndex
                for (i in 0..maxLines) {
                    address.getAddressLine(i)?.let { line ->
                        addressParts.add(line)
                    }
                }
                addressParts.joinToString(", ")
            }
        } catch (e: Exception) {
            null
        }
    }
    
    data class LocationData(
        val latitude: Double,
        val longitude: Double,
        val address: String?,
        val accuracy: Float
    )
}
EOF
          fi
          
          # 添加coroutines-play-services依赖
          if [ -f "app/build.gradle" ]; then
            echo "添加coroutines-play-services依赖..."
            if ! grep -q "kotlinx-coroutines-play-services" app/build.gradle; then
              sed -i '/kotlinx-coroutines-android/a\    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.7.3"' app/build.gradle
            fi
          fi
          
          echo "修复完成"
        fi
    - run: |
        if [ -d "android" ]; then
          cd android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          else
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          fi
        else
          echo "android directory not found"
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk
        path: android/app/build/outputs/apk/debug/*.apk
