package com.oa.app.util

import android.content.Context
import androidx.datastore.core.DataStore
import androidx.datastore.preferences.core.*
import androidx.datastore.preferences.preferencesDataStore
import com.oa.app.Config
import kotlinx.coroutines.flow.Flow
import kotlinx.coroutines.flow.map
import kotlinx.coroutines.flow.first

val Context.dataStore: DataStore<Preferences> by preferencesDataStore(name = "settings")

class AuthManager(private val context: Context) {
    
    val tokenFlow: Flow<String?> = context.dataStore.data.map { preferences ->
        preferences[stringPreferencesKey(Config.PREF_TOKEN)]
    }
    
    suspend fun saveToken(token: String) {
        context.dataStore.edit { preferences ->
            preferences[stringPreferencesKey(Config.PREF_TOKEN)] = token
        }
    }
    
    suspend fun saveUserInfo(employeeId: String, name: String) {
        context.dataStore.edit { preferences ->
            preferences[stringPreferencesKey(Config.PREF_EMPLOYEE_ID)] = employeeId
            preferences[stringPreferencesKey(Config.PREF_NAME)] = name
        }
    }
    
    suspend fun clearAuth() {
        context.dataStore.edit { preferences ->
            preferences.clear()
        }
    }
    
    suspend fun getToken(): String? {
        return context.dataStore.data.map { preferences ->
            preferences[stringPreferencesKey(Config.PREF_TOKEN)]
        }.first()
    }
    
    suspend fun isLoggedIn(): Boolean {
        return getToken() != null
    }
}

// 文件2: android/app/src/main/java/com/oa/app/util/LocationHelper.kt
package com.oa.app.util

import android.Manifest
import android.content.Context
import android.content.pm.PackageManager
import android.location.Address
import android.location.Geocoder
import android.location.Location
import androidx.core.content.ContextCompat
import com.google.android.gms.location.FusedLocationProviderClient
import com.google.android.gms.location.LocationServices
import kotlinx.coroutines.suspendCancellableCoroutine
import java.util.Locale
import kotlin.coroutines.resume
import kotlin.coroutines.resumeWithException

class LocationHelper(private val context: Context) {
    
    private val fusedLocationClient: FusedLocationProviderClient = 
        LocationServices.getFusedLocationProviderClient(context)
    
    suspend fun getCurrentLocation(): LocationData? {
        if (ContextCompat.checkSelfPermission(
                context,
                Manifest.permission.ACCESS_FINE_LOCATION
            ) != PackageManager.PERMISSION_GRANTED
        ) {
            return null
        }
        
        return try {
            val location = getLastLocation()
            
            location?.let { loc ->
                val address = getAddressFromLocation(loc.latitude, loc.longitude)
                LocationData(
                    latitude = loc.latitude,
                    longitude = loc.longitude,
                    address = address,
                    accuracy = loc.accuracy
                )
            }
        } catch (e: Exception) {
            e.printStackTrace()
            null
        }
    }
    
    private suspend fun getLastLocation(): Location? = suspendCancellableCoroutine { continuation ->
        fusedLocationClient.lastLocation
            .addOnSuccessListener { location ->
                continuation.resume(location)
            }
            .addOnFailureListener { exception ->
                continuation.resumeWithException(exception)
            }
    }
    
    private fun getAddressFromLocation(latitude: Double, longitude: Double): String? {
        return try {
            val geocoder = Geocoder(context, Locale.getDefault())
            val addresses: List<Address>? = geocoder.getFromLocation(latitude, longitude, 1)
            addresses?.firstOrNull()?.let { address ->
                val addressParts = mutableListOf<String>()
                val maxLines = address.maxAddressLineIndex
                for (i in 0..maxLines) {
                    address.getAddressLine(i)?.let { line ->
                        addressParts.add(line)
                    }
                }
                addressParts.joinToString(", ")
            }
        } catch (e: Exception) {
            null
        }
    }
    
    data class LocationData(
        val latitude: Double,
        val longitude: Double,
        val address: String?,
        val accuracy: Float
    )
}

// 文件3: .github/workflows/build-apk.yml
name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        cd $GITHUB_WORKSPACE
    - run: |
        if [ -d "android" ]; then
          cd android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          else
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          fi
        else
          echo "android directory not found"
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk
        path: android/app/build/outputs/apk/debug/*.apk

