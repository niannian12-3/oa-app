name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: Fix Android dependencies
      run: |
        cd android
        
        # 确保gradlew存在
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found, checking gradle directory..."
          ls -la gradle/wrapper/ || true
        fi
        
        # 添加Material依赖
        if grep -q "dependencies {" app/build.gradle; then
          if ! grep -q "com.google.android.material:material" app/build.gradle; then
            echo 'Adding Material dependency...'
            sed -i '/dependencies {/a\    implementation "com.google.android.material:material:1.11.0"' app/build.gradle
          fi
        fi
    
    - name: Create simple theme
      run: |
        cd android
        
        # 创建简单主题文件（没有heredoc）
        mkdir -p app/src/main/res/values
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/themes.xml
        echo '<resources>' >> app/src/main/res/values/themes.xml
        echo '    <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorPrimary">#3F51B5</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorPrimaryDark">#303F9F</item>' >> app/src/main/res/values/themes.xml
        echo '        <item name="colorAccent">#FF4081</item>' >> app/src/main/res/values/themes.xml
        echo '    </style>' >> app/src/main/res/values/themes.xml
        echo '</resources>' >> app/src/main/res/values/themes.xml
        
        # 更新AndroidManifest使用简单主题
        if [ -f "app/src/main/AndroidManifest.xml" ]; then
          sed -i 's/Theme\.Material3\.DayNight\.DarkActionBar/AppTheme/g' app/src/main/AndroidManifest.xml
          sed -i 's/Theme\.Material3\.Light\.DarkActionBar/AppTheme/g' app/src/main/AndroidManifest.xml
          sed -i 's/Theme\.Material3/AppTheme/g' app/src/main/AndroidManifest.xml
        fi
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew 2>/dev/null || true
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
