name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        cd $GITHUB_WORKSPACE
    - run: |
        if [ -d "android" ]; then
          cd android
          
          # 1. 创建最简单的MainActivity.kt
          mkdir -p app/src/main/java/com/oa/app
          echo 'package com.oa.app' > app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import android.os.Bundle' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import android.widget.Button' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import android.widget.EditText' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import android.widget.TextView' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import android.widget.Toast' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import androidx.appcompat.app.AppCompatActivity' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'class MainActivity : AppCompatActivity() {' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '    override fun onCreate(savedInstanceState: Bundle?) {' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        super.onCreate(savedInstanceState)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        setContentView(R.layout.activity_main)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        val employeeIdEditText = findViewById<EditText>(R.id.employeeIdEditText)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        val passwordEditText = findViewById<EditText>(R.id.passwordEditText)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        val loginButton = findViewById<Button>(R.id.loginButton)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        val statusTextView = findViewById<TextView>(R.id.statusTextView)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        loginButton.setOnClickListener {' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '            val employeeId = employeeIdEditText.text.toString()' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '            val password = passwordEditText.text.toString()' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '            if (employeeId.isEmpty() || password.isEmpty()) {' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '                Toast.makeText(this, "请输入员工ID和密码", Toast.LENGTH_SHORT).show()' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '            } else {' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '                statusTextView.text = "登录成功！员工ID: " + employeeId' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '                Toast.makeText(this, "登录成功！", Toast.LENGTH_SHORT).show()' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '            }' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        }' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        statusTextView.text = "OA办公系统版本 1.0.0"' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '    }' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '}' >> app/src/main/java/com/oa/app/MainActivity.kt
          
          # 2. 创建最简单的activity_main.xml
          mkdir -p app/src/main/res/layout
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/layout/activity_main.xml
          echo '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"' >> app/src/main/res/layout/activity_main.xml
          echo '    xmlns:tools="http://schemas.android.com/tools"' >> app/src/main/res/layout/activity_main.xml
          echo '    android:layout_width="match_parent"' >> app/src/main/res/layout/activity_main.xml
          echo '    android:layout_height="match_parent"' >> app/src/main/res/layout/activity_main.xml
          echo '    android:orientation="vertical"' >> app/src/main/res/layout/activity_main.xml
          echo '    android:padding="16dp"' >> app/src/main/res/layout/activity_main.xml
          echo '    android:gravity="center"' >> app/src/main/res/layout/activity_main.xml
          echo '    tools:context=".MainActivity">' >> app/src/main/res/layout/activity_main.xml
          echo '' >> app/src/main/res/layout/activity_main.xml
          echo '    <TextView' >> app/src/main/layout/activity_main.xml
          echo '        android:id="@+id/titleTextView"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_width="wrap_content"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_height="wrap_content"' >> app/src/main/layout/activity_main.xml
          echo '        android:text="OA办公系统"' >> app/src/main/layout/activity_main.xml
          echo '        android:textSize="24sp"' >> app/src/main/layout/activity_main.xml
          echo '        android:textStyle="bold"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_marginBottom="32dp"/>' >> app/src/main/layout/activity_main.xml
          echo '' >> app/src/main/layout/activity_main.xml
          echo '    <EditText' >> app/src/main/layout/activity_main.xml
          echo '        android:id="@+id/employeeIdEditText"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_width="match_parent"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_height="wrap_content"' >> app/src/main/layout/activity_main.xml
          echo '        android:hint="员工ID"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_marginBottom="16dp"/>' >> app/src/main/layout/activity_main.xml
          echo '' >> app/src/main/layout/activity_main.xml
          echo '    <EditText' >> app/src/main/layout/activity_main.xml
          echo '        android:id="@+id/passwordEditText"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_width="match_parent"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_height="wrap_content"' >> app/src/main/layout/activity_main.xml
          echo '        android:hint="密码"' >> app/src/main/layout/activity_main.xml
          echo '        android:inputType="textPassword"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_marginBottom="24dp"/>' >> app/src/main/layout/activity_main.xml
          echo '' >> app/src/main/layout/activity_main.xml
          echo '    <Button' >> app/src/main/layout/activity_main.xml
          echo '        android:id="@+id/loginButton"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_width="match_parent"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_height="wrap_content"' >> app/src/main/layout/activity_main.xml
          echo '        android:text="登录"' >> app/src/main/layout/activity_main.xml
          echo '        android:textSize="18sp"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_marginBottom="32dp"/>' >> app/src/main/layout/activity_main.xml
          echo '' >> app/src/main/layout/activity_main.xml
          echo '    <TextView' >> app/src/main/layout/activity_main.xml
          echo '        android:id="@+id/statusTextView"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_width="match_parent"' >> app/src/main/layout/activity_main.xml
          echo '        android:layout_height="wrap_content"' >> app/src/main/layout/activity_main.xml
          echo '        android:text="准备登录..."' >> app/src/main/layout/activity_main.xml
          echo '        android:textSize="16sp"' >> app/src/main/layout/activity_main.xml
          echo '        android:gravity="center"' >> app/src/main/layout/activity_main.xml
          echo '        android:padding="16dp"/>' >> app/src/main/layout/activity_main.xml
          echo '' >> app/src/main/layout/activity_main.xml
          echo '</LinearLayout>' >> app/src/main/layout/activity_main.xml
          
          # 3. 创建AndroidManifest.xml
          mkdir -p app/src/main
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/AndroidManifest.xml
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android">' >> app/src/main/AndroidManifest.xml
          echo '' >> app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> app/src/main/AndroidManifest.xml
          echo '' >> app/src/main/AndroidManifest.xml
          echo '    <application' >> app/src/main/AndroidManifest.xml
          echo '        android:allowBackup="true"' >> app/src/main/AndroidManifest.xml
          echo '        android:icon="@mipmap/ic_launcher"' >> app/src/main/AndroidManifest.xml
          echo '        android:label="OA办公"' >> app/src/main/AndroidManifest.xml
          echo '        android:roundIcon="@mipmap/ic_launcher_round"' >> app/src/main/AndroidManifest.xml
          echo '        android:supportsRtl="true"' >> app/src/main/AndroidManifest.xml
          echo '        android:theme="@style/Theme.AppCompat.Light.DarkActionBar">' >> app/src/main/AndroidManifest.xml
          echo '' >> app/src/main/AndroidManifest.xml
          echo '        <activity' >> app/src/main/AndroidManifest.xml
          echo '            android:name=".MainActivity"' >> app/src/main/AndroidManifest.xml
          echo '            android:exported="true">' >> app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN" />' >> app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER" />' >> app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '        </activity>' >> app/src/main/AndroidManifest.xml
          echo '    </application>' >> app/src/main/AndroidManifest.xml
          echo '</manifest>' >> app/src/main/AndroidManifest.xml
          
          # 4. 创建资源文件
          mkdir -p app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/strings.xml
          echo '<resources>' >> app/src/main/res/values/strings.xml
          echo '    <string name="app_name">OA办公</string>' >> app/src/main/res/values/strings.xml
          echo '</resources>' >> app/src/main/res/values/strings.xml
          
          # 5. 创建build.gradle
          echo 'plugins {' > app/build.gradle
          echo '    id "com.android.application"' >> app/build.gradle
          echo '    id "org.jetbrains.kotlin.android"' >> app/build.gradle
          echo '}' >> app/build.gradle
          echo '' >> app/build.gradle
          echo 'android {' >> app/build.gradle
          echo '    namespace "com.oa.app"' >> app/build.gradle
          echo '    compileSdk 34' >> app/build.gradle
          echo '' >> app/build.gradle
          echo '    defaultConfig {' >> app/build.gradle
          echo '        applicationId "com.oa.app"' >> app/build.gradle
          echo '        minSdk 21' >> app/build.gradle
          echo '        targetSdk 34' >> app/build.gradle
          echo '        versionCode 1' >> app/build.gradle
          echo '        versionName "1.0.0"' >> app/build.gradle
          echo '    }' >> app/build.gradle
          echo '' >> app/build.gradle
          echo '    buildTypes {' >> app/build.gradle
          echo '        release {' >> app/build.gradle
          echo '            minifyEnabled false' >> app/build.gradle
          echo '            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"' >> app/build.gradle
          echo '        }' >> app/build.gradle
          echo '    }' >> app/build.gradle
          echo '' >> app/build.gradle
          echo '    compileOptions {' >> app/build.gradle
          echo '        sourceCompatibility JavaVersion.VERSION_1_8' >> app/build.gradle
          echo '        targetCompatibility JavaVersion.VERSION_1_8' >> app/build.gradle
          echo '    }' >> app/build.gradle
          echo '' >> app/src/main/AndroidManifest.xml
          echo '    kotlinOptions {' >> app/build.gradle
          echo '        jvmTarget = "1.8"' >> app/build.gradle
          echo '    }' >> app/build.gradle
          echo '}' >> app/build.gradle
          echo '' >> app/build.gradle
          echo 'dependencies {' >> app/build.gradle
          echo '    implementation "androidx.core:core-ktx:1.12.0"' >> app/build.gradle
          echo '    implementation "androidx.appcompat:appcompat:1.6.1"' >> app/build.gradle
          echo '    implementation "com.google.android.material:material:1.11.0"' >> app/build.gradle
          echo '}' >> app/build.gradle
          
          # 6. 构建APK
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug
          else
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug
          fi
        else
          echo "android directory not found"
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk
        path: android/app/build/outputs/apk/debug/*.apk
