name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整历史，防止某些 gradle 插件报错

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Detect Project Structure & Fix Gradle
      id: setup_gradle
      run: |
        echo "🔍 检测项目结构..."
        
        # 情况 1: 如果根目录就有 build.gradle (通常是 React Native 或纯 Android 根项目)
        if [ -f "build.gradle" ] || [ -f "settings.gradle" ]; then
          echo "✅ 发现根目录是 Android 项目根路径"
          echo "PROJECT_DIR=." >> $GITHUB_ENV
          
        # 情况 2: 如果有 android 文件夹
        elif [ -d "android" ] && [ -f "android/build.gradle" ]; then
          echo "✅ 发现 android 子目录"
          echo "PROJECT_DIR=android" >> $GITHUB_ENV
          
        else
          echo "❌ 错误：找不到 Android 项目结构 (未发现 build.gradle 或 android 目录)"
          ls -R
          exit 1
        fi

        cd $PROJECT_DIR
        
        # 关键修复：如果 gradlew 不存在，尝试生成它
        if [ ! -f "gradlew" ]; then
          echo "⚠️ gradlew 不存在，正在尝试生成..."
          # 尝试使用系统安装的 gradle 生成 wrapper
          if command -v gradle &> /dev/null; then
            gradle wrapper --gradle-version 8.2
          else
            # 如果没有 gradle 命令，尝试下载官方脚本生成 (备用方案)
            echo " downloading gradle wrapper jar..."
            mkdir -p gradle/wrapper
            curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            cat > gradle/wrapper/gradle-wrapper.properties << EOF
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
            # 创建一个简单的 gradlew 脚本 (Linux)
            cat > gradlew << 'GRADLEW_SCRIPT'
#!/bin/sh
exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
GRADLEW_SCRIPT
            chmod +x gradlew
          fi
        else
          chmod +x gradlew
          echo "✅ gradlew 已存在并赋予权限"
        fi

        # 验证依赖 (可选，防止缺少 material)
        if [ -f "app/build.gradle" ]; then
           if ! grep -q "com.google.android.material:material" app/build.gradle; then
             echo "⚠️ 添加 Material 依赖..."
             sed -i "/dependencies {/a\\    implementation 'com.google.android.material:material:1.11.0'" app/build.gradle
           fi
        fi

    - name: Build APK
      run: |
        cd $PROJECT_DIR
        echo "🚀 开始在 $PROJECT_DIR 构建..."
        
        # 清理并构建
        ./gradlew clean assembleDebug --stacktrace --no-daemon --warning-mode all

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always() # 即使失败也尝试运行，方便看日志
      with:
        name: app-debug-apk
        path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
        retention-days: 5
        if-no-files-found: warn # 如果没找到文件只警告，不报错，方便调试
