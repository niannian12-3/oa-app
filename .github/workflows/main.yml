name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js 24 (fix deprecated warning)
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: Check project structure
      run: |
        echo "当前目录内容:"
        ls -la
        echo "android目录内容:"
        ls -la android/
    
    - name: Fix Android project
      run: |
        # 进入android目录
        cd android
        
        # 检查gradlew是否存在
        if [ ! -f "gradlew" ]; then
          echo "gradlew不存在，创建gradle wrapper..."
          ./gradle/wrapper/gradle wrapper --gradle-version 8.2
        fi
        
        # 添加Material依赖
        if ! grep -q "com.google.android.material:material" app/build.gradle; then
          echo '    implementation "com.google.android.material:material:1.11.0"' >> app/build.gradle
        fi
        
        # 创建主题文件
        mkdir -p app/src/main/res/values
        cat > app/src/main/res/values/themes.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources xmlns:tools="http://schemas.android.com/tools">
    <style name="Theme.Material3.DayNight.DarkActionBar" parent="Theme.Material3.DayNight">
        <item name="colorPrimary">@color/purple_500</item>
        <item name="colorPrimaryVariant">@color/purple_700</item>
        <item name="colorOnPrimary">@color/white</item>
        <item name="colorSecondary">@color/teal_200</item>
        <item name="colorSecondaryVariant">@color/teal_700</item>
        <item name="colorOnSecondary">@color/black</item>
        <item name="android:statusBarColor" tools:targetApi="l">?attr/colorPrimaryVariant</item>
    </style>
</resources>
EOF
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
