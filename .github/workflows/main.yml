name: 构建安卓APK

on:
  push:
    branches: [主分支]

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 安装 Android SDK 组件
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: 添加Material 3依赖
      run: |
        echo "修复Android项目依赖..."
        cd android
        
        # 备份原始build.gradle
        cp app/build.gradle app/build.gradle.backup
        
        # 添加Material 3依赖
        sed -i "/dependencies {/a\    implementation 'com.google.android.material:material:1.11.0'" app/build.gradle
        
        echo "Material 3依赖已添加"
    
    - name: 创建主题文件
      run: |
        echo "创建主题文件..."
        cd android
        
        # 创建主题目录
        mkdir -p app/src/main/res/values
        
        # 创建主题文件
        cat > app/src/main/res/values/themes.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources xmlns:tools="http://schemas.android.com/tools">
    <style name="Theme.Material3.DayNight.DarkActionBar" parent="Theme.Material3.DayNight">
        <item name="colorPrimary">@color/purple_500</item>
        <item name="colorPrimaryVariant">@color/purple_700</item>
        <item name="colorOnPrimary">@color/white</item>
        <item name="colorSecondary">@color/teal_200</item>
        <item name="colorSecondaryVariant">@color/teal_700</item>
        <item name="colorOnSecondary">@color/black</item>
        <item name="android:statusBarColor" tools:targetApi="l">?attr/colorPrimaryVariant</item>
    </style>
</resources>
EOF
        
        echo "主题文件已创建"
    
    - name: 使用gradlew构建
      run: |
        echo "进入android目录..."
        cd android
        
        echo "检查gradlew文件..."
        if [ -f "gradlew" ]; then
          echo "使用项目自带的gradlew..."
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        else
          echo "项目没有gradlew，生成gradlew 8.2..."
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        fi
    
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: oa-app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
