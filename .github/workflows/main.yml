name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk wget unzip
          mkdir -p ~/android-sdk
          cd ~/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools cmdline-tools-temp
          mkdir -p cmdline-tools
          mv cmdline-tools-temp cmdline-tools/latest
          export ANDROID_HOME=~/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          cd $GITHUB_WORKSPACE
      - name: Fix theme issue
        run: |
          if [ -d "android" ]; then
            cd android
            
            # 添加Material依赖
            if grep -q "dependencies {" app/build.gradle; then
              if ! grep -q "com.google.android.material:material" app/build.gradle; then
                sed -i '/dependencies {/a\    implementation "com.google.android.material:material:1.11.0"' app/build.gradle
              fi
            fi
            
            # 创建主题文件（没有heredoc）
            mkdir -p app/src/main/res/values
            echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/themes.xml
            echo '<resources xmlns:tools="http://schemas.android.com/tools">' >> app/src/main/res/values/themes.xml
            echo '    <style name="Theme.Material3.DayNight.DarkActionBar" parent="Theme.Material3.DayNight">' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorPrimary">#6200EE</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorPrimaryVariant">#3700B3</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorOnPrimary">#FFFFFF</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorSecondary">#03DAC6</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorSecondaryVariant">#018786</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="colorOnSecondary">#000000</item>' >> app/src/main/res/values/themes.xml
            echo '        <item name="android:statusBarColor" tools:targetApi="l">?attr/colorPrimaryVariant</item>' >> app/src/main/res/values/themes.xml
            echo '    </style>' >> app/src/main/res/values/themes.xml
            echo '</resources>' >> app/src/main/res/values/themes.xml
            
            # 修改AndroidManifest使用简单主题（如果还不行）
            if [ -f "app/src/main/AndroidManifest.xml" ]; then
              cp app/src/main/AndroidManifest.xml app/src/main/AndroidManifest.xml.backup
              sed -i 's/Theme\.Material3\.DayNight\.DarkActionBar/Theme\.AppCompat\.Light\.DarkActionBar/g' app/src/main/AndroidManifest.xml
            fi
          fi
      - run: |
          if [ -d "android" ]; then
            cd android
            if [ -f "gradlew" ]; then
              chmod +x gradlew
              ./gradlew assembleDebug --stacktrace
            else
              wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
              unzip -q gradle-8.2-bin.zip
              ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
              chmod +x gradlew
              ./gradlew assembleDebug --stacktrace
            fi
          else
            echo "android directory not found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/*.apk
