name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup and Build
      run: |
        set -e
        echo "🔧 Installing dependencies..."
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk wget unzip
        
        echo "📦 Setting up Android SDK..."
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        yes | sdkmanager --licenses > /dev/null
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        
        cd $GITHUB_WORKSPACE
        
        # --- 确定项目目录 ---
        PROJECT_DIR="android"
        if [ ! -d "$PROJECT_DIR" ]; then
          echo "❌ Error: android directory not found!"
          exit 1
        fi
        
        cd $PROJECT_DIR
        echo "🚀 Working in directory: $PROJECT_DIR"
        
        # --- 关键修复：如果没有 gradlew，就现场生成一个！ ---
        if [ ! -f "gradlew" ]; then
          echo "⚠️ gradlew not found! Generating it now..."
          
          # 1. 确保有 gradle wrapper jar (从本地 SDK 或远程下载)
          GRADLE_WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$GRADLE_WRAPPER_JAR" ]; then
            echo "📥 Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            wget -q -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          fi
          
          # 2. 创建 gradlew 脚本 (Linux 版本)
          echo "📝 Creating gradlew script..."
          cat > gradlew << 'GRADLEW_SCRIPT'
#!/bin/sh
#
# Copyright © 2015-2021 the original authors.
#
# Licensed under the Apache License, Version 2.0 (the "License");
# you may not use this file except in compliance with the License.
# You may obtain a copy of the License at
#
#      https://www.apache.org/licenses/LICENSE-2.0
#
# Unless required by applicable law or agreed to in writing, software
# distributed under the License is distributed on an "AS IS" BASIS,
# WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
# See the License for the specific language governing permissions and
# limitations under the License.
#

##############################################################################
#
#   Gradle start up script for POSIX generated by Gradle.
#
##############################################################################

# Attempt to set APP_HOME
# Resolve links: $0 may be a link
app_path=$0
while
    APP_HOME=${app_path%"${app_path##*/}"}  # leaves a trailing /; empty if no leading path
    [ -h "$app_path" ]
do
    ls=$( ls -ld "$app_path" )
    link=${ls#*' -> '}
    case $link in             #(
      /*)   app_path=$link ;; #(
      *)    app_path=$APP_HOME$link ;;
    esac
done

APP_HOME=$( cd "${APP_HOME:-./}" && pwd -P ) || exit

APP_NAME="Gradle"
APP_BASE_NAME=${0##*/}

# Add default JVM options here. You can also use JAVA_OPTS and GRADLE_OPTS to pass JVM options to this script.
DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'

# Use the maximum available, or set MAX_FD != -1 to use that value.
MAX_FD=maximum

warn () {
    echo "$*"
} >&2

die () {
    echo
    echo "$*"
    echo
    exit 1
} >&2

# OS specific support (must be 'true' or 'false').
cygwin=false
msys=false
darwin=false
nonstop=false
case "$( uname )" in                #(
  CYGWIN* )         cygwin=true  ;; #(
  Darwin* )         darwin=true  ;; #(
  MSYS* | MINGW* )  msys=true    ;; #(
  NONSTOP* )        nonstop=true ;;
esac

CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar

# Determine the Java command to use to start the JVM.
if [ -n "$JAVA_HOME" ] ; then
    if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
        # IBM's JDK on AIX uses strange locations for the executables
        JAVACMD=$JAVA_HOME/jre/sh/java
    else
        JAVACMD=$JAVA_HOME/bin/java
    fi
    if [ ! -x "$JAVACMD" ] ; then
        die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME"
    fi
else
    JAVACMD=java
    which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH."
fi

# Increase the maximum file descriptors if we can.
if ! "$cygwin" && ! "$darwin" && ! "$nonstop" ; then
    case $MAX_FD in #(
      max*)
        MAX_FD=$( ulimit -H -n ) ||
            warn "Could not query maximum file descriptor limit"
    esac
    case $MAX_FD in  #(
      '' | soft) :;; #(
      *)
        ulimit -n "$MAX_FD" ||
            warn "Could not set maximum file descriptor limit to $MAX_FD"
    esac
fi

# Collect all arguments for the java command, stacking in reverse order:
#   * args from the command line
#   * the main class name
#   * -classpath
#   * -D...appname settings
#   * --module-path (only if needed)
#   * DEFAULT_JVM_OPTS, JAVA_OPTS, and GRADLE_OPTS environment variables.

# For Cygwin or MSYS, switch paths to Windows format before running java
if "$cygwin" || "$msys" ; then
    APP_HOME=$( cygpath --path --mixed "$APP_HOME" )
    CLASSPATH=$( cygpath --path --mixed "$CLASSPATH" )
    JAVACMD=$( cygpath --unix "$JAVACMD" )
fi

# Collect all arguments for the java command;
#   * $DEFAULT_JVM_OPTS, $JAVA_OPTS, and $GRADLE_OPTS can contain fragments of
#     temporary shell script that should be evaluated to separate them properly.
#   * The command itself is the last argument.

exec "$JAVACMD" \
    $DEFAULT_JVM_OPTS \
    $JAVA_OPTS \
    $GRADLE_OPTS \
    "-Dorg.gradle.appname=$APP_BASE_NAME" \
    -classpath "$CLASSPATH" \
    org.gradle.wrapper.GradleWrapperMain \
    "$@"
GRADLEW_SCRIPT

          chmod +x gradlew
          echo "✅ gradlew generated successfully."
        else
          chmod +x gradlew
          echo "✅ Found existing gradlew."
        fi

        # 检查 gradle-wrapper.properties 是否存在，不存在则创建一个默认的
        if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
          echo "📝 Creating gradle-wrapper.properties..."
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
PROPS
        fi

        echo "🔨 Fixing source code..."

        # 1. 修复主题
        if [ -f "app/src/main/res/values/themes.xml" ]; then
          sed -i 's/Theme.Material3.DayNight.DarkActionBar/Theme.AppCompat.Light.DarkActionBar/g' app/src/main/res/values/themes.xml
          sed -i 's/Theme.Material3.DayNight/Theme.AppCompat.Light/g' app/src/main/res/values/themes.xml
        fi

        # 2. 修复 Manifest
        if [ -f "app/src/main/AndroidManifest.xml" ]; then
          sed -i 's/android:icon="@mipmap\/ic_launcher"//g' app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' app/src/main/AndroidManifest.xml
          sed -i 's/@style\/Theme.OAApp/@style\/Theme.AppCompat.Light.DarkActionBar/g' app/src/main/AndroidManifest.xml
        fi

        # 3. 创建目录
        mkdir -p app/src/main/java/com/oa/app/util
        mkdir -p app/src/main/res/layout

        # 4. 写入 Config.kt
        printf '%s\n' 'package com.oa.app' '' 'object Config {' '    const val PREF_TOKEN = "user_token"' '}' > app/src/main/java/com/oa/app/Config.kt

        # 5. 写入 AuthManager.kt
        printf '%s\n' 'package com.oa.app.util' '' 'import android.content.Context' 'import androidx.datastore.core.DataStore' 'import androidx.datastore.preferences.core.*' 'import androidx.datastore.preferences.preferencesDataStore' 'import com.oa.app.Config' 'import kotlinx.coroutines.flow.firstOrNull' '' 'val Context.dataStore: DataStore<Preferences> by preferencesDataStore(name = "settings")' '' 'class AuthManager(private val context: Context) {' '    suspend fun saveToken(token: String) {' '        context.dataStore.edit { preferences ->' '            preferences[stringPreferencesKey(Config.PREF_TOKEN)] = token' '        }' '    }' '' '    suspend fun clearAuth() {' '        context.dataStore.edit { preferences ->' '            preferences.clear()' '        }' '    }' '' '    suspend fun getToken(): String? {' '        return try {' '            val preferences = context.dataStore.data.firstOrNull()' '            preferences?.get(stringPreferencesKey(Config.PREF_TOKEN))' '        } catch (e: Exception) {' '            null' '        }' '    }' '' '    suspend fun isLoggedIn(): Boolean {' '        return getToken() != null' '    }' '}' > app/src/main/java/com/oa/app/util/AuthManager.kt

        # 6. 写入 LocationHelper.kt
        printf '%s\n' 'package com.oa.app.util' '' 'import android.Manifest' 'import android.content.Context' 'import android.content.pm.PackageManager' 'import androidx.core.content.ContextCompat' '' 'class LocationHelper(private val context: Context) {' '    fun hasLocationPermission(): Boolean {' '        return ContextCompat.checkSelfPermission(' '            context,' '            Manifest.permission.ACCESS_FINE_LOCATION' '        ) == PackageManager.PERMISSION_GRANTED' '    }' '}' > app/src/main/java/com/oa/app/util/LocationHelper.kt

        # 7. 写入 MainActivity.kt
        printf '%s\n' 'package com.oa.app' '' 'import android.os.Bundle' 'import androidx.appcompat.app.AppCompatActivity' '' 'class MainActivity : AppCompatActivity() {' '    override fun onCreate(savedInstanceState: Bundle?) {' '        super.onCreate(savedInstanceState)' '        setContentView(R.layout.activity_main)' '    }' '}' > app/src/main/java/com/oa/app/MainActivity.kt

        # 8. 写入 activity_main.xml (解决闪退的关键)
        printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<androidx.constraintlayout.widget.ConstraintLayout' '    xmlns:android="http://schemas.android.com/apk/res/android"' '    xmlns:app="http://schemas.android.com/apk/res-auto"' '    xmlns:tools="http://schemas.android.com/tools"' '    android:layout_width="match_parent"' '    android:layout_height="match_parent"' '    tools:context=".MainActivity">' '' '    <TextView' '        android:id="@+id/textView"' '        android:layout_width="wrap_content"' '        android:layout_height="wrap_content"' '        android:text="OA App Running Successfully!"' '        android:textSize="24sp"' '        android:textColor="#000000"' '        app:layout_constraintBottom_toBottomOf="parent"' '        app:layout_constraintLeft_toLeftOf="parent"' '        app:layout_constraintRight_toRightOf="parent"' '        app:layout_constraintTop_toTopOf="parent" />' '' '</androidx.constraintlayout.widget.ConstraintLayout>' > app/src/main/res/layout/activity_main.xml

        # 9. 注入 Gradle 依赖
        if [ -f "app/build.gradle" ]; then
          echo "📝 Injecting Gradle dependencies..."
          
          if ! grep -q "kotlinx-coroutines-android" app/build.gradle; then
            sed -i '/dependencies {/a\    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"' app/build.gradle
          fi
          if ! grep -q "datastore-preferences" app/build.gradle; then
            sed -i '/dependencies {/a\    implementation "androidx.datastore:datastore-preferences:1.0.0"' app/build.gradle
          fi
          if ! grep -q "constraintlayout" app/build.gradle; then
            sed -i '/dependencies {/a\    implementation "androidx.constraintlayout:constraintlayout:2.1.4"' app/build.gradle
          fi
          if ! grep -q "appcompat" app/build.gradle; then
            sed -i '/dependencies {/a\    implementation "androidx.appcompat:appcompat:1.6.1"' app/build.gradle
          fi
        else
          echo "⚠️ Warning: app/build.gradle not found."
        fi

        # 10. 编译
        echo "🔨 Building APK..."
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OA-App-Debug
        path: android/app/build/outputs/apk/debug/*.apk
