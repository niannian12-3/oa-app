name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        cd $GITHUB_WORKSPACE
    - run: |
        cd android
        mkdir -p app/src/main/java/com/oa/app
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        
        # 创建最简单的MainActivity.kt
        cat > app/src/main/java/com/oa/app/MainActivity.kt << 'EOF'
package com.oa.app
import android.os.Bundle
import android.widget.Button
import android.widget.EditText
import android.widget.TextView
import android.widget.Toast
import androidx.appcompat.app.AppCompatActivity
class MainActivity : AppCompatActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_main)
        val employeeIdEditText = findViewById<EditText>(R.id.employeeIdEditText)
        val passwordEditText = findViewById<EditText>(R.id.passwordEditText)
        val loginButton = findViewById<Button>(R.id.loginButton)
        val statusTextView = findViewById<TextView>(R.id.statusTextView)
        statusTextView.text = "OA办公系统\n版本1.0.0\n后端地址:192.168.11.43:3000"
        loginButton.setOnClickListener {
            val employeeId = employeeIdEditText.text.toString()
            val password = passwordEditText.text.toString()
            if (employeeId.isEmpty() || password.isEmpty()) {
                Toast.makeText(this, "请输入员工ID和密码", Toast.LENGTH_SHORT).show()
            } else {
                statusTextView.text = "登录成功！\n员工ID: $employeeId\n后端地址:192.168.11.43:3000"
                Toast.makeText(this, "登录成功！", Toast.LENGTH_SHORT).show()
            }
        }
    }
}
EOF
        
        # 创建布局文件
        cat > app/src/main/res/layout/activity_main.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:padding="16dp"
    android:gravity="center">
    <TextView
        android:id="@+id/titleTextView"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="OA办公系统"
        android:textSize="24sp"
        android:textStyle="bold"
        android:layout_marginBottom="32dp"/>
    <EditText
        android:id="@+id/employeeIdEditText"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:hint="员工ID"
        android:layout_marginBottom="16dp"/>
    <EditText
        android:id="@+id/passwordEditText"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:hint="密码"
        android:inputType="textPassword"
        android:layout_marginBottom="24dp"/>
    <Button
        android:id="@+id/loginButton"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:text="登录"
        android:textSize="18sp"
        android:layout_marginBottom="32dp"/>
    <TextView
        android:id="@+id/statusTextView"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:text="准备登录..."
        android:textSize="16sp"
        android:gravity="center"
        android:padding="16dp"/>
</LinearLayout>
EOF
        
        # 创建其他必要文件
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/AndroidManifest.xml
        echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android">' >> app/src/main/AndroidManifest.xml
        echo '    <uses-permission android:name="android.permission.INTERNET" />' >> app/src/main/AndroidManifest.xml
        echo '    <application' >> app/src/main/AndroidManifest.xml
        echo '        android:allowBackup="true"' >> app/src/main/AndroidManifest.xml
        echo '        android:icon="@mipmap/ic_launcher"' >> app/src/main/AndroidManifest.xml
        echo '        android:label="OA办公"' >> app/src/main/AndroidManifest.xml
        echo '        android:roundIcon="@mipmap/ic_launcher_round"' >> app/src/main/AndroidManifest.xml
        echo '        android:supportsRtl="true"' >> app/src/main/AndroidManifest.xml
        echo '        android:theme="@style/Theme.AppCompat.Light.DarkActionBar">' >> app/src/main/AndroidManifest.xml
        echo '        <activity' >> app/src/main/AndroidManifest.xml
        echo '            android:name=".MainActivity"' >> app/src/main/AndroidManifest.xml
        echo '            android:exported="true">' >> app/src/main/AndroidManifest.xml
        echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '                <action android:name="android.intent.action.MAIN" />' >> app/src/main/AndroidManifest.xml
        echo '                <category android:name="android.intent.category.LAUNCHER" />' >> app/src/main/AndroidManifest.xml
        echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
        echo '        </activity>' >> app/src/main/AndroidManifest.xml
        echo '    </application>' >> app/src/main/AndroidManifest.xml
        echo '</manifest>' >> app/src/main/AndroidManifest.xml
        
        echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/strings.xml
        echo '<resources>' >> app/src/main/res/values/strings.xml
        echo '    <string name="app_name">OA办公</string>' >> app/src/main/res/values/strings.xml
        echo '</resources>' >> app/src/main/res/values/strings.xml
        
        # 构建APK
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug
        else
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug
        fi
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk
        path: android/app/build/outputs/apk/debug/*.apk
