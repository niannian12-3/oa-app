name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        cd $GITHUB_WORKSPACE
    - run: |
        if [ -d "android" ]; then
          cd android
          
          # 1. 创建最简单的AuthManager.kt - 避免所有复杂代码
          mkdir -p app/src/main/java/com/oa/app/util
          echo 'package com.oa.app.util' > app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo 'import android.content.Context' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo 'import android.content.SharedPreferences' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo 'class AuthManager(private val context: Context) {' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    private val sharedPref: SharedPreferences = context.getSharedPreferences("oa_app_prefs", Context.MODE_PRIVATE)' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    fun saveToken(token: String) {' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '        sharedPref.edit().putString("token", token).apply()' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    }' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    fun getToken(): String? {' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '        return sharedPref.getString("token", null)' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    }' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    fun clearAuth() {' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '        sharedPref.edit().clear().apply()' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    }' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    fun isLoggedIn(): Boolean {' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '        return getToken() != null' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '    }' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          echo '}' >> app/src/main/java/com/oa/app/util/AuthManager.kt
          
          # 2. 创建最简单的LocationHelper.kt
          echo 'package com.oa.app.util' > app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo 'import android.Manifest' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo 'import android.content.Context' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo 'import android.content.pm.PackageManager' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo 'import androidx.core.content.ContextCompat' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo 'class LocationHelper(private val context: Context) {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '    fun hasLocationPermission(): Boolean {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '        return ContextCompat.checkSelfPermission(' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '            context,' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '            Manifest.permission.ACCESS_FINE_LOCATION' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '        ) == PackageManager.PERMISSION_GRANTED' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '    }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          echo '}' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          
          # 3. 创建最简单的MainActivity.kt
          mkdir -p app/src/main/java/com/oa/app
          echo 'package com.oa.app' > app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import android.os.Bundle' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import android.widget.TextView' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'import androidx.appcompat.app.AppCompatActivity' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo 'class MainActivity : AppCompatActivity() {' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '    override fun onCreate(savedInstanceState: Bundle?) {' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        super.onCreate(savedInstanceState)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        // 创建最简单的布局' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        val textView = TextView(this)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        textView.text = "OA App - 启动成功！"' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        textView.textSize = 20f' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        textView.setPadding(50, 50, 50, 50)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        setContentView(textView)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        // 测试AuthManager' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        val authManager = com.oa.app.util.AuthManager(this)' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '        println("AuthManager测试: ${authManager.isLoggedIn()}")' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '    }' >> app/src/main/java/com/oa/app/MainActivity.kt
          echo '}' >> app/src/main/java/com/oa/app/MainActivity.kt
          
          # 4. 创建最简单的Config.kt
          echo 'package com.oa.app' > app/src/main/java/com/oa/app/Config.kt
          echo '' >> app/src/main/java/com/oa/app/Config.kt
          echo 'object Config {' >> app/src/main/java/com/oa/app/Config.kt
          echo '    const val PREF_TOKEN = "token"' >> app/src/main/java/com/oa/app/Config.kt
          echo '    const val PREF_EMPLOYEE_ID = "employee_id"' >> app/src/main/java/com/oa/app/Config.kt
          echo '    const val PREF_NAME = "name"' >> app/src/main/java/com/oa/app/Config.kt
          echo '}' >> app/src/main/java/com/oa/app/Config.kt
          
          # 5. 修复AndroidManifest.xml - 创建最简单的版本
          mkdir -p app/src/main
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/AndroidManifest.xml
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"' >> app/src/main/AndroidManifest.xml
          echo '    xmlns:tools="http://schemas.android.com/tools">' >> app/src/main/AndroidManifest.xml
          echo '' >> app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' >> app/src/main/AndroidManifest.xml
          echo '' >> app/src/main/AndroidManifest.xml
          echo '    <application' >> app/src/main/AndroidManifest.xml
          echo '        android:allowBackup="true"' >> app/src/main/AndroidManifest.xml
          echo '        android:dataExtractionRules="@xml/data_extraction_rules"' >> app/src/main/AndroidManifest.xml
          echo '        android:fullBackupContent="@xml/backup_rules"' >> app/src/main/AndroidManifest.xml
          echo '        android:icon="@mipmap/ic_launcher"' >> app/src/main/AndroidManifest.xml
          echo '        android:label="@string/app_name"' >> app/src/main/AndroidManifest.xml
          echo '        android:roundIcon="@mipmap/ic_launcher_round"' >> app/src/main/AndroidManifest.xml
          echo '        android:supportsRtl="true"' >> app/src/main/AndroidManifest.xml
          echo '        android:theme="@style/Theme.AppCompat.Light.DarkActionBar"' >> app/src/main/AndroidManifest.xml
          echo '        tools:targetApi="31">' >> app/src/main/AndroidManifest.xml
          echo '' >> app/src/main/AndroidManifest.xml
          echo '        <activity' >> app/src/main/AndroidManifest.xml
          echo '            android:name=".MainActivity"' >> app/src/main/AndroidManifest.xml
          echo '            android:exported="true"' >> app/src/main/AndroidManifest.xml
          echo '            android:theme="@style/Theme.AppCompat.Light.DarkActionBar">' >> app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN" />' >> app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER" />' >> app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '        </activity>' >> app/src/main/AndroidManifest.xml
          echo '    </application>' >> app/src/main/AndroidManifest.xml
          echo '</manifest>' >> app/src/main/AndroidManifest.xml
          
          # 6. 创建必要的资源文件
          mkdir -p app/src/main/res/values
          
          # strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/strings.xml
          echo '<resources>' >> app/src/main/res/values/strings.xml
          echo '    <string name="app_name">OA App</string>' >> app/src/main/res/values/strings.xml
          echo '</resources>' >> app/src/main/res/values/strings.xml
          
          # themes.xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/themes.xml
          echo '<resources xmlns:tools="http://schemas.android.com/tools">' >> app/src/main/res/values/themes.xml
          echo '    <style name="Theme.OAApp" parent="Theme.AppCompat.Light.DarkActionBar">' >> app/src/main/res/values/themes.xml
          echo '        <item name="colorPrimary">#3F51B5</item>' >> app/src/main/res/values/themes.xml
          echo '        <item name="colorPrimaryDark">#303F9F</item>' >> app/src/main/res/values/themes.xml
          echo '        <item name="colorAccent">#FF4081</item>' >> app/src/main/res/values/themes.xml
          echo '    </style>' >> app/src/main/res/values/themes.xml
          echo '</resources>' >> app/src/main/res/values/themes.xml
          
          # 7. 简化build.gradle - 移除所有可能导致问题的依赖
          if [ -f "app/build.gradle" ]; then
            echo 'plugins {' > app/build.gradle
            echo '    id "com.android.application"' >> app/build.gradle
            echo '    id "org.jetbrains.kotlin.android"' >> app/build.gradle
            echo '}' >> app/build.gradle
            echo '' >> app/build.gradle
            echo 'android {' >> app/build.gradle
            echo '    namespace "com.oa.app"' >> app/build.gradle
            echo '    compileSdk 34' >> app/build.gradle
            echo '' >> app/build.gradle
            echo '    defaultConfig {' >> app/build.gradle
            echo '        applicationId "com.oa.app"' >> app/build.gradle
            echo '        minSdk 21' >> app/build.gradle
            echo '        targetSdk 34' >> app/build.gradle
            echo '        versionCode 1' >> app/build.gradle
            echo '        versionName "1.0.0"' >> app/build.gradle
            echo '' >> app/build.gradle
            echo '        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"' >> app/build.gradle
            echo '    }' >> app/build.gradle
            echo '' >> app/build.gradle
            echo '    buildTypes {' >> app/build.gradle
            echo '        release {' >> app/build.gradle
            echo '            minifyEnabled false' >> app/build.gradle
            echo '            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"' >> app/build.gradle
            echo '        }' >> app/build.gradle
            echo '    }' >> app/build.gradle
            echo '' >> app/build.gradle
            echo '    compileOptions {' >> app/build.gradle
            echo '        sourceCompatibility JavaVersion.VERSION_1_8' >> app/build.gradle
            echo '        targetCompatibility JavaVersion.VERSION_1_8' >> app/build.gradle
            echo '    }' >> app/build.gradle
            echo '' >> app/build.gradle
            echo '    kotlinOptions {' >> app/build.gradle
            echo '        jvmTarget = "1.8"' >> app/build.gradle
            echo '    }' >> app/build.gradle
            echo '}' >> app/build.gradle
            echo '' >> app/build.gradle
            echo 'dependencies {' >> app/build.gradle
            echo '    implementation "androidx.core:core-ktx:1.12.0"' >> app/build.gradle
            echo '    implementation "androidx.appcompat:appcompat:1.6.1"' >> app/build.gradle
            echo '    implementation "com.google.android.material:material:1.11.0"' >> app/build.gradle
            echo '    implementation "androidx.constraintlayout:constraintlayout:2.1.4"' >> app/build.gradle
            echo '' >> app/build.gradle
            echo '    testImplementation "junit:junit:4.13.2"' >> app/build.gradle
            echo '    androidTestImplementation "androidx.test.ext:junit:1.1.5"' >> app/build.gradle
            echo '    androidTestImplementation "androidx.test.espresso:espresso-core:3.5.1"' >> app/build.gradle
            echo '}' >> app/build.gradle
          fi
          
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          else
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8
