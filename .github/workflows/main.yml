- name: 生成调试版APK
  run: |
    echo "检查项目结构..."
    ls -la
    echo "检查android文件夹..."
    ls -la android/ || echo "没有android文件夹"
    echo "检查gradlew文件..."
    ls -la android/gradlew || echo "没有gradlew文件"
    
    # 如果找到gradlew再运行
    if [ -f "android/gradlew" ]; then
      cd android
      chmod +x gradlew
      ./gradlew assembleDebug
    else
      echo "错误：找不到gradlew文件"
      exit 1
    fi
