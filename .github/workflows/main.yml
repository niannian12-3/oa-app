name: 构建安卓APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # 临时忽略Node.js版本警告
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 生成调试版APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace  # 加上--stacktrace看详细错误
    
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: oa-app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
