name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Environment
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses > /dev/null
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        cd $GITHUB_WORKSPACE

    - name: Fix Code and Generate Wrapper
      run: |
        # 1. 进入 android 目录
        if [ ! -d "android" ]; then
          echo "❌ android directory not found!"
          exit 1
        fi
        cd android
        
        echo "🔧 Generating missing Gradle Wrapper..."
        
        # 2. 下载 gradlew 脚本
        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew -O gradlew
        chmod +x gradlew
        
        # 3. 创建 gradle/wrapper 目录并下载 jar
        mkdir -p gradle/wrapper
        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        
        # 4. 创建 gradle-wrapper.properties
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        
        echo "✅ Gradle Wrapper generated successfully."
        
        # 5. 修复主题文件
        if [ -f "app/src/main/res/values/themes.xml" ]; then
          sed -i 's/Theme.Material3.DayNight.DarkActionBar/Theme.AppCompat.Light.DarkActionBar/g' app/src/main/res/values/themes.xml
          sed -i 's/Theme.Material3.DayNight/Theme.AppCompat.Light/g' app/src/main/res/values/themes.xml
        fi
        
        # 6. 修复 AndroidManifest.xml
        if [ -f "app/src/main/AndroidManifest.xml" ]; then
          sed -i 's/android:icon="@mipmap\/ic_launcher"//g' app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' app/src/main/AndroidManifest.xml
          sed -i 's/@style\/Theme.OAApp/@style\/Theme.AppCompat.Light.DarkActionBar/g' app/src/main/AndroidManifest.xml
        fi
        
        # 7. 确保目录存在
        mkdir -p app/src/main/java/com/oa/app/util
        mkdir -p app/src/main/java/com/oa/app
        mkdir -p app/src/main/res/layout
        
        # 8. 生成 Config.kt
        echo "package com.oa.app" > app/src/main/java/com/oa/app/Config.kt
        echo "" >> app/src/main/java/com/oa/app/Config.kt
        echo "object Config {" >> app/src/main/java/com/oa/app/Config.kt
        echo "    const val PREF_TOKEN = \"user_token\"" >> app/src/main/java/com/oa/app/Config.kt
        echo "}" >> app/src/main/java/com/oa/app/Config.kt

        # 9. 生成 AuthManager.kt
        echo "package com.oa.app.util" > app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "import android.content.Context" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "import androidx.datastore.core.DataStore" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "import androidx.datastore.preferences.core.*" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "import androidx.datastore.preferences.preferencesDataStore" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "import com.oa.app.Config" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "import kotlinx.coroutines.flow.firstOrNull" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "val Context.dataStore: DataStore<Preferences> by preferencesDataStore(name = \"settings\")" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "class AuthManager(private val context: Context) {" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "    suspend fun saveToken(token: String) {" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "        context.dataStore.edit { preferences ->" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "            preferences[stringPreferencesKey(Config.PREF_TOKEN)] = token" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "        }" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "    }" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "    suspend fun clearAuth() {" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "        context.dataStore.edit { preferences ->" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "            preferences.clear()" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "        }" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "    }" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "    suspend fun getToken(): String? {" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "        return try {" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "            val preferences = context.dataStore.data.firstOrNull()" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "            preferences?.get(stringPreferencesKey(Config.PREF_TOKEN))" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "        } catch (e: Exception) {" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "            null" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "        }" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "    }" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "    suspend fun isLoggedIn(): Boolean {" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "        return getToken() != null" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "    }" >> app/src/main/java/com/oa/app/util/AuthManager.kt
        echo "}" >> app/src/main/java/com/oa/app/util/AuthManager.kt

        # 10. 生成 LocationHelper.kt
        echo "package com.oa.app.util" > app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "import android.Manifest" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "import android.content.Context" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "import android.content.pm.PackageManager" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "import androidx.core.content.ContextCompat" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "class LocationHelper(private val context: Context) {" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "    fun hasLocationPermission(): Boolean {" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "        return ContextCompat.checkSelfPermission(" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "            context," >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "            Manifest.permission.ACCESS_FINE_LOCATION" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "        ) == PackageManager.PERMISSION_GRANTED" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "    }" >> app/src/main/java/com/oa/app/util/LocationHelper.kt
        echo "}" >> app/src/main/java/com/oa/app/util/LocationHelper.kt

        # 11. 生成 MainActivity.kt
        echo "package com.oa.app" > app/src/main/java/com/oa/app/MainActivity.kt
        echo "" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "import android.os.Bundle" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "import androidx.appcompat.app.AppCompatActivity" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "class MainActivity : AppCompatActivity() {" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "    override fun onCreate(savedInstanceState: Bundle?) {" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "        super.onCreate(savedInstanceState)" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "        setContentView(R.layout.activity_main)" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "    }" >> app/src/main/java/com/oa/app/MainActivity.kt
        echo "}" >> app/src/main/java/com/oa/app/MainActivity.kt

        # 12. 生成 activity_main.xml
        echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > app/src/main/res/layout/activity_main.xml
        echo "<androidx.constraintlayout.widget.ConstraintLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"" >> app/src/main/res/layout/activity_main.xml
        echo "    xmlns:app=\"http://schemas.android.com/apk/res-auto\"" >> app/src/main/res/layout/activity_main.xml
        echo "    xmlns:tools=\"http://schemas.android.com/tools\"" >> app/src/main/res/layout/activity_main.xml
        echo "    android:layout_width=\"match_parent\"" >> app/src/main/res/layout/activity_main.xml
        echo "    android:layout_height=\"match_parent\"" >> app/src/main/res/layout/activity_main.xml
        echo "    tools:context=\".MainActivity\">" >> app/src/main/res/layout/activity_main.xml
        echo "    <TextView" >> app/src/main/res/layout/activity_main.xml
        echo "        android:id=\"@+id/textView\"" >> app/src/main/res/layout/activity_main.xml
        echo "        android:layout_width=\"wrap_content\"" >> app/src/main/res/layout/activity_main.xml
        echo "        android:layout_height=\"wrap_content\"" >> app/src/main/res/layout/activity_main.xml
        echo "        android:text=\"OA App Built Successfully!\"" >> app/src/main/res/layout/activity_main.xml
        echo "        android:textSize=\"24sp\"" >> app/src/main/res/layout/activity_main.xml
        echo "        android:textColor=\"#000000\"" >> app/src/main/res/layout/activity_main.xml
        echo "        app:layout_constraintBottom_toBottomOf=\"parent\"" >> app/src/main/res/layout/activity_main.xml
        echo "        app:layout_constraintLeft_toLeftOf=\"parent\"" >> app/src/main/res/layout/activity_main.xml
        echo "        app:layout_constraintRight_toRightOf=\"parent\"" >> app/src/main/res/layout/activity_main.xml
        echo "        app:layout_constraintTop_toTopOf=\"parent\" />" >> app/src/main/res/layout/activity_main.xml
        echo "</androidx.constraintlayout.widget.ConstraintLayout>" >> app/src/main/res/layout/activity_main.xml

        echo "🚀 Starting Build..."
        ./gradlew clean --no-daemon
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OA-App-Debug
        path: android/app/build/outputs/apk/debug/*.apk
