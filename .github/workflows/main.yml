name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        cd $GITHUB_WORKSPACE
    - name: Fix project issues
      run: |
        if [ -d "android" ]; then
          cd android
          
          # 修复主题问题 - 将Material3改为AppCompat
          if [ -f "app/src/main/res/values/themes.xml" ]; then
            echo "修复主题文件..."
            sed -i 's/Theme\.Material3\.DayNight\.DarkActionBar/Theme.AppCompat.Light.DarkActionBar/g' app/src/main/res/values/themes.xml
          fi
          
          # 修复AuthManager.kt
          if [ -f "app/src/main/java/com/oa/app/util/AuthManager.kt" ]; then
            echo "修复AuthManager.kt..."
            sed -i 's/\.firstOrNull()/.first()/g' app/src/main/java/com/oa/app/util/AuthManager.kt
          fi
          
          # 修复LocationHelper.kt - 使用简单方法
          if [ -f "app/src/main/java/com/oa/app/util/LocationHelper.kt" ]; then
            echo "修复LocationHelper.kt..."
            # 直接写入简单版本
            echo 'package com.oa.app.util' > app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import android.Manifest' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import android.content.Context' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import android.content.pm.PackageManager' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import android.location.Address' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import android.location.Geocoder' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import androidx.core.content.ContextCompat' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import com.google.android.gms.location.FusedLocationProviderClient' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import com.google.android.gms.location.LocationServices' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import kotlinx.coroutines.suspendCancellableCoroutine' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import java.util.Locale' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import kotlin.coroutines.resume' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'import kotlin.coroutines.resumeWithException' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo 'class LocationHelper(private val context: Context) {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '    private val fusedLocationClient: FusedLocationProviderClient =' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        LocationServices.getFusedLocationProviderClient(context)' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '    suspend fun getCurrentLocation(): LocationData? {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        if (ContextCompat.checkSelfPermission(' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                context,' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                Manifest.permission.ACCESS_FINE_LOCATION' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            ) != PackageManager.PERMISSION_GRANTED) {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            return null' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        return try {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            val task = fusedLocationClient.lastLocation' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            val location = suspendCancellableCoroutine { continuation ->' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                task.addOnSuccessListener { location ->' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                    continuation.resume(location)' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                .addOnFailureListener { exception ->' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                    continuation.resumeWithException(exception)' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            location?.let { loc ->' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                val address = getAddressFromLocation(loc.latitude, loc.longitude)' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                LocationData(' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                    latitude = loc.latitude,' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                    longitude = loc.longitude,' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                    address = address,' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                    accuracy = loc.accuracy' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                )' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        } catch (e: Exception) {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            e.printStackTrace()' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            null' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '    }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '    private fun getAddressFromLocation(latitude: Double, longitude: Double): String? {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        return try {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            val geocoder = Geocoder(context, Locale.getDefault())' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            val addresses: List<Address>? = geocoder.getFromLocation(latitude, longitude, 1)' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            addresses?.firstOrNull()?.let { address ->' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                val addressParts = mutableListOf<String>()' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                for (i in 0 until address.maxAddressLineIndex) {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                    address.getAddressLine(i)?.let { line ->' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                        addressParts.add(line)' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                    }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '                addressParts.joinToString(", ")' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        } catch (e: Exception) {' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '            null' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '    }' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '    data class LocationData(' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        val latitude: Double,' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        val longitude: Double,' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        val address: String?,' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '        val accuracy: Float' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '    )' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
            echo '}' >> app/src/main/java/com/oa/app/util/LocationHelper.kt
          fi
          
          # 确保有必要的依赖
          if [ -f "app/build.gradle" ]; then
            echo "检查依赖..."
            # 确保有AppCompat
            if ! grep -q "androidx.appcompat:appcompat" app/build.gradle; then
              echo "添加AppCompat依赖..."
              sed -i '/dependencies {/a\    implementation "androidx.appcompat:appcompat:1.6.1"' app/build.gradle
            fi
            # 确保有coroutines-play-services
            if ! grep -q "kotlinx-coroutines-play-services" app/build.gradle; then
              echo "添加coroutines-play-services依赖..."
              sed -i '/kotlinx-coroutines-android/a\    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.7.3"' app/build.gradle
            fi
          fi
          
          echo "修复完成"
        fi
    - run: |
        if [ -d "android" ]; then
          cd android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          else
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          fi
        else
          echo "android directory not found"
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk
        path: android/app/build/outputs/apk/debug/*.apk
