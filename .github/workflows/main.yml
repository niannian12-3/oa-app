name:         保留天数：30

on名称：构建安卓APK
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 安装 Android SDK 组件
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: 使用项目自带的gradlew构建
      run: |
        echo "检查项目自带的gradlew..."
        
        # 如果项目有gradlew就用项目的，没有就用gradle命令
        if [ -f "android/gradlew" ]; then
          echo "使用项目自带的gradlew..."
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        else
          echo "项目没有gradlew，使用gradle命令..."
          cd android
          
          # 先检查项目用的Gradle版本
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "查看gradle-wrapper.properties..."
            cat gradle/wrapper/gradle-wrapper.properties
          fi
          
          # 使用兼容的Gradle版本
          gradle assembleDebug --stacktrace --gradle-version 7.5
        fi
    
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: oa-app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
