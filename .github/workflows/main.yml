name: 构建安卓APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 安装 Android SDK 组件
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
    
    - name: 使用Gradle 7.5构建
      run: |
        echo "进入android目录..."
        cd android
        
        echo "下载Gradle 7.5..."
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip
        unzip -q gradle-7.5-bin.zip
        
        echo "使用Gradle 7.5构建..."
        ./gradle-7.5/bin/gradle assembleDebug --stacktrace
    
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: oa-app-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
