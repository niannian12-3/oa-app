name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        cd $GITHUB_WORKSPACE
    - name: Fix project issues
      run: |
        if [ -d "android" ]; then
          cd android
          
          echo "=== 修复主题问题 ==="
          # 修复主题问题 - 将Material3改为AppCompat
          if [ -f "app/src/main/res/values/themes.xml" ]; then
            echo "修复主题文件..."
            sed -i 's/Theme\.Material3\.DayNight\.DarkActionBar/Theme.AppCompat.Light.DarkActionBar/g' app/src/main/res/values/themes.xml
          fi
          
          echo "=== 修复图标引用 ==="
          # 修复AndroidManifest.xml - 移除不存在的图标引用
          if [ -f "app/src/main/AndroidManifest.xml" ]; then
            echo "修复AndroidManifest.xml..."
            # 移除图标引用
            sed -i 's/android:icon="@mipmap\/ic_launcher"//g' app/src/main/AndroidManifest.xml
            sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' app/src/main/AndroidManifest.xml
          fi
          
          echo "=== 修复Kotlin文件 ==="
          # 修复AuthManager.kt
          if [ -f "app/src/main/java/com/oa/app/util/AuthManager.kt" ]; then
            echo "修复AuthManager.kt..."
            sed -i 's/\.firstOrNull()/.first()/g' app/src/main/java/com/oa/app/util/AuthManager.kt
          fi
          
          # 修复LocationHelper.kt - 创建简单版本
          if [ -f "app/src/main/java/com/oa/app/util/LocationHelper.kt" ]; then
            echo "修复LocationHelper.kt..."
            # 创建最简单的版本
            cat > app/src/main/java/com/oa/app/util/LocationHelper.kt << 'EOF'
package com.oa.app.util

import android.Manifest
import android.content.Context
import android.content.pm.PackageManager
import android.location.Address
import android.location.Geocoder
import androidx.core.content.ContextCompat
import java.util.Locale

class LocationHelper(private val context: Context) {
    
    fun hasLocationPermission(): Boolean {
        return ContextCompat.checkSelfPermission(
            context,
            Manifest.permission.ACCESS_FINE_LOCATION
        ) == PackageManager.PERMISSION_GRANTED
    }
    
    fun getAddressFromLocation(latitude: Double, longitude: Double): String? {
        return try {
            val geocoder = Geocoder(context, Locale.getDefault())
            val addresses: List<Address>? = geocoder.getFromLocation(latitude, longitude, 1)
            addresses?.firstOrNull()?.let { address ->
                val addressParts = mutableListOf<String>()
                for (i in 0 until address.maxAddressLineIndex) {
                    address.getAddressLine(i)?.let { line ->
                        addressParts.add(line)
                    }
                }
                addressParts.joinToString(", ")
            }
        } catch (e: Exception) {
            null
        }
    }
    
    data class LocationData(
        val latitude: Double,
        val longitude: Double,
        val address: String?,
        val accuracy: Float
    )
}
EOF
          fi
          
          echo "=== 修复依赖 ==="
          # 确保有必要的依赖
          if [ -f "app/build.gradle" ]; then
            echo "检查依赖..."
            # 确保有AppCompat
            if ! grep -q "androidx.appcompat:appcompat" app/build.gradle; then
              echo "添加AppCompat依赖..."
              sed -i '/dependencies {/a\    implementation "androidx.appcompat:appcompat:1.6.1"' app/build.gradle
            fi
          fi
          
          echo "=== 创建默认图标 ==="
          # 创建默认图标文件
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          
          # 创建简单的ic_launcher.xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' >> app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo '    <background android:drawable="@color/primary"/>' >> app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo '    <foreground android:drawable="@drawable/ic_launcher_foreground"/>' >> app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo '</adaptive-icon>' >> app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          
          echo "修复完成"
        fi
    - run: |
        if [ -d "android" ]; then
          cd android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          else
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug --stacktrace
          fi
        else
          echo "android directory not found"
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk
        path: android/app/build/outputs/apk/debug/*.apk
