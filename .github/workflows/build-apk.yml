name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
    
    - name: Setup Android SDK
      run: |
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/tools/bin:$ANDROID_HOME/tools" >> $GITHUB_PATH
    
    - name: Fix Android project
      run: |
        if [ -d "android" ]; then
          cd android
          
          # 1. 确保有AppCompat依赖
          if [ -f "app/build.gradle" ]; then
            # 检查是否已经有dependencies块
            if grep -q "dependencies {" app/build.gradle; then
              # 添加AppCompat依赖（如果不存在）
              if ! grep -q "androidx.appcompat:appcompat" app/build.gradle; then
                sed -i '/dependencies {/a\    implementation "androidx.appcompat:appcompat:1.6.1"' app/build.gradle
              fi
            else
              # 如果没有dependencies块，在文件末尾添加
              echo '' >> app/build.gradle
              echo 'dependencies {' >> app/build.gradle
              echo '    implementation "androidx.appcompat:appcompat:1.6.1"' >> app/build.gradle
              echo '}' >> app/build.gradle
            fi
          fi
          
          # 2. 修复主题文件 - 使用AppCompat而不是Material3
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/themes.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources xmlns:tools="http://schemas.android.com/tools">
    <style name="Theme.OAApp" parent="Theme.AppCompat.Light.DarkActionBar">
        <item name="colorPrimary">#3F51B5</item>
        <item name="colorPrimaryDark">#303F9F</item>
        <item name="colorAccent">#FF4081</item>
        <item name="android:statusBarColor">#303F9F</item>
    </style>
</resources>
EOF
          
          # 3. 创建完整的strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">OA App</string>
    <string name="clock_in">Clock In</string>
    <string name="clock_out">Clock Out</string>
    <string name="login_title">Login</string>
    <string name="employee_id">Employee ID</string>
    <string name="password">Password</string>
    <string name="login">Login</string>
    <string name="nav_attendance">Attendance</string>
    <string name="nav_leave">Leave</string>
    <string name="nav_expense">Expense</string>
    <string name="nav_employees">Employees</string>
    <string name="nav_mine">Mine</string>
    <string name="attendance">Attendance</string>
    <string name="leave">Leave</string>
    <string name="expense">Expense</string>
    <string name="employees">Employees</string>
</resources>
EOF
          
          # 4. 修复AndroidManifest.xml - 强制使用AppCompat主题
          if [ -f "app/src/main/AndroidManifest.xml" ]; then
            # 读取文件内容
            content=$(cat app/src/main/AndroidManifest.xml)
            
            # 替换所有主题引用为Theme.OAApp
            content=${content//Theme\.Material3\.DayNight\.DarkActionBar/Theme.OAApp}
            content=${content//Theme\.Material3/Theme.OAApp}
            content=${content//android:theme=\"@style\/Theme\"/android:theme=\"@style\/Theme.OAApp\"}
            
            # 移除图标引用
            content=${content//android:icon=\"@mipmap\/ic_launcher\"/}
            content=${content//android:roundIcon=\"@mipmap\/ic_launcher_round\"/}
            
            # 写回文件
            echo "$content" > app/src/main/AndroidManifest.xml
          fi
          
          echo "项目修复完成：使用AppCompat主题"
        fi
    
    - name: Setup Gradle Wrapper
      run: |
        if [ -d "android" ]; then
          cd android
          if [ ! -f "gradlew" ]; then
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
            chmod +x gradlew
          fi
        fi
    
    - name: Build APK
      run: |
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace
        else
          echo "android directory not found"
          exit 1
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk
        path: android/app/build/outputs/apk/debug/*.apk