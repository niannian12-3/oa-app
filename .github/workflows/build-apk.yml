name: Build Stable APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    - name: Setup Android SDK
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip
        mkdir -p ~/android-sdk
        cd ~/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir -p cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest

        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

        cd $GITHUB_WORKSPACE

    - name: Create Simple App
      run: |
        if [ -d "android" ]; then
          cd android

          echo "=== 创建最简单的应用 ==="

          # 创建MainActivity.kt
          mkdir -p app/src/main/java/com/oa/app
          cat > app/src/main/java/com/oa/app/MainActivity.kt << 'MAIN_EOF'
package com.oa.app

import android.os.Bundle
import android.widget.Button
import android.widget.EditText
import android.widget.TextView
import android.widget.Toast
import androidx.appcompat.app.AppCompatActivity

class MainActivity : AppCompatActivity() {

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_main)

        val employeeIdEditText = findViewById<EditText>(R.id.employeeIdEditText)
        val passwordEditText = findViewById<EditText>(R.id.passwordEditText)
        val loginButton = findViewById<Button>(R.id.loginButton)
        val statusTextView = findViewById<TextView>(R.id.statusTextView)

        statusTextView.text = "OA办公系统\n版本 1.0.0\n后端地址: 192.168.11.43:3000"

        loginButton.setOnClickListener {
            val employeeId = employeeIdEditText.text.toString()
            val password = passwordEditText.text.toString()

            if (employeeId.isEmpty() || password.isEmpty()) {
                Toast.makeText(this, "请输入员工ID和密码", Toast.LENGTH_SHORT).show()
            } else {
                statusTextView.text = "登录成功！\n员工ID: $employeeId\n后端地址: 192.168.11.43:3000"
                Toast.makeText(this, "登录成功！", Toast.LENGTH_SHORT).show()
            }
        }
    }
}
MAIN_EOF

          # 创建布局文件
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT_EOF'
<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:padding="16dp"
    android:gravity="center"
    android:background="#f5f5f5">

    <TextView
        android:id="@+id/titleTextView"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="OA办公系统"
        android:textSize="28sp"
        android:textStyle="bold"
        android:textColor="#3F51B5"
        android:layout_marginBottom="32dp"/>

    <EditText
        android:id="@+id/employeeIdEditText"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:hint="员工ID"
        android:inputType="number"
        android:padding="12dp"
        android:background="@android:drawable/editbox_background"
        android:layout_marginBottom="16dp"/>

    <EditText
        android:id="@+id/passwordEditText"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:hint="密码"
        android:inputType="textPassword"
        android:padding="12dp"
        android:background="@android:drawable/editbox_background"
        android:layout_marginBottom="24dp"/>

    <Button
        android:id="@+id/loginButton"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:text="登录"
        android:textSize="18sp"
        android:background="#3F51B5"
        android:textColor="#FFFFFF"
        android:padding="12dp"
        android:layout_marginBottom="32dp"/>

    <TextView
        android:id="@+id/statusTextView"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:text="准备登录..."
        android:textSize="16sp"
        android:gravity="center"
        android:padding="16dp"
        android:background="#FFFFFF"
        android:elevation="2dp"
        android:textColor="#333333"/>
</LinearLayout>
LAYOUT_EOF

          # 创建AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">

    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="OA办公"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:supportsRtl="true"
        android:theme="@style/Theme.AppCompat.Light.DarkActionBar">

        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:screenOrientation="portrait">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
MANIFEST_EOF

          # 创建strings.xml
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'STRINGS_EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">OA办公</string>
</resources>
STRINGS_EOF

          # 创建build.gradle
          cat > app/build.gradle << 'GRADLE_EOF'
plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.oa.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.oa.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
GRADLE_EOF

          # 构建APK
          echo "=== 开始构建APK ==="
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug
          else
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleDebug
          fi
        else
